<div style="margin:0 auto;max-width:568px;background-color:#ffffff;">
  <table align="center" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#ffffff;width:100%;border-collapse:collapse;">
    <tbody>
      <tr>
        <td style="padding:22px 34px 0 34px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
            <tr>
              <td style="vertical-align:top;width:48%;padding-right:18px;text-align:left;">
                <div style="font-family:Helvetica, Arial, sans-serif;font-size:11px;font-weight:700;letter-spacing:0.8px;line-height:1.6;text-transform:uppercase;color:#6e7f6d;text-align:left;">
                  Account Summary
                </div>
                <div style="font-family:Helvetica, Arial, sans-serif;font-size:14px;line-height:1.75;color:#425466;padding-top:10px;text-align:left;">
                  A quick look at the key invoice details.
                </div>
              </td>
              <td style="vertical-align:top;width:52%;text-align:left;">
                <div style="border-left:3px solid #c9dd80;padding-left:16px;text-align:left;">
                  <div style="font-family:Helvetica, Arial, sans-serif;font-size:13px;line-height:1.7;color:#2e403d;padding-bottom:10px;text-align:left;"><strong>Invoice:</strong> {{INVOICE_NUMBER}}</div>
                  <div style="font-family:Helvetica, Arial, sans-serif;font-size:13px;line-height:1.7;color:#2e403d;padding-bottom:10px;text-align:left;"><strong>Due Date:</strong> {{INVOICE_DUE_DATE}}</div>
                  <div style="font-family:Helvetica, Arial, sans-serif;font-size:13px;line-height:1.7;color:#2e403d;text-align:left;"><strong>Account Balance:</strong> {{CUSTOMER_ACCOUNT_BALANCE}}</div>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </tbody>
  </table>
</div>
