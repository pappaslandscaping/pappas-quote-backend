            }

            // Load existing requests
            loadServiceRequests(token);
        }

        async function loadServiceRequests(token) {
            const container = document.getElementById('serviceRequestsList');
            if (!container) return;

            try {
                const res = await fetch(`/api/portal/${token}/service-requests`);
                if (!res.ok) throw new Error('Failed to load requests');

                const data = await res.json();
                const requests = data.requests || data || [];

                if (requests.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0118 18.75h-2.25m-7.5-10.5H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V18.75m-7.5-10.5h6.375c.621 0 1.125.504 1.125 1.125v9.375m-8.25-3l1.5 1.5 3-3.75"/></svg>
                            <p>No service requests yet. Submit one above!</p>
                        </div>`;
                    return;
                }

                let html = '';
                requests.forEach(req => {
                    const status = req.status || 'pending';
                    const statusClass = getServiceStatusClass(status);
                    const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
                    const serviceType = escapeHtml(req.service_type || req.type || 'Service');
                    const date = req.preferred_date || req.created_at || '';
                    const desc = req.description || '';
                    const urgency = req.urgency || 'normal';

                    html += `
                        <div class="request-card">
                            <div class="request-card-header">
                                <h4>${serviceType}${urgency === 'urgent' ? ' <span style="color:#d97706;font-size:12px;">URGENT</span>' : ''}</h4>
                                <span class="badge badge-${statusClass}">${statusLabel}</span>
                            </div>
                            <div class="request-card-meta">
                                ${date ? `Preferred date: ${formatDate(date)}` : ''}
                                ${req.created_at ? ` &middot; Submitted ${formatDate(req.created_at)}` : ''}
                            </div>
                            ${desc ? `<div class="request-card-desc">${escapeHtml(desc)}</div>` : ''}
                        </div>`;
                });
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<div class="message message-error">${escapeHtml(err.message)}</div>`;
            }
        }

        function getServiceStatusClass(status) {
            switch ((status || '').toLowerCase()) {
                case 'pending': return 'pending';
                case 'approved': return 'approved';
                case 'completed': return 'completed';
                case 'declined': return 'declined';
                default: return 'pending';
            }
        }

        async function submitServiceRequest() {
            const serviceType = document.getElementById('serviceType').value;
            const description = document.getElementById('serviceDesc').value.trim();
            const preferredDate = document.getElementById('serviceDate').value;
            const urgency = document.getElementById('serviceUrgency').value;
            const msgEl = document.getElementById('serviceFormMessage');
            const btn = document.getElementById('submitServiceBtn');

            if (!serviceType) {
                msgEl.innerHTML = '<div class="message message-error" style="margin-top:12px;">Please select a service type.</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Submitting...';
            msgEl.innerHTML = '';

            try {
                const res = await fetch(`/api/portal/${portalToken}/service-requests`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        service_type: serviceType,
                        description: description,
                        preferred_date: preferredDate,
                        urgency: urgency
                    })
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Failed to submit request');
                }

                msgEl.innerHTML = '<div class="message message-success" style="margin-top:12px;">Service request submitted successfully!</div>';
                btn.textContent = 'Submit Request';
                btn.disabled = false;

                // Reset form
                document.getElementById('serviceType').value = '';
                document.getElementById('serviceDesc').value = '';
                document.getElementById('serviceUrgency').value = 'normal';

                // Reload requests list
                loadServiceRequests(portalToken);
            } catch (err) {
                msgEl.innerHTML = `<div class="message message-error" style="margin-top:12px;">${escapeHtml(err.message)}</div>`;
                btn.textContent = 'Submit Request';
                btn.disabled = false;
            }
        }

        // ── Rate Us Tab ───────────────────────────────────────────────────
        // Smart filter: high ratings (4-5) → Google Reviews, low ratings (1-3) → private feedback
        let selectedRating = 0;
        let rateUsPhase = 'stars'; // 'stars' | 'google' | 'feedback' | 'thanks'

        // Google review URL — fetched from business_settings or fallback
        let googleReviewUrl = '';

        async function loadRateUs(token) {
            const content = document.getElementById('tabContent');

            // Try to fetch Google review URL from settings
            if (!googleReviewUrl) {
                try {
                    const res = await fetch(`/api/portal/${token}/google-review-url`);
                    if (res.ok) {
                        const data = await res.json();
                        googleReviewUrl = data.url || '';
                    }
                } catch (e) { /* ignore */ }
            }

            if (rateUsPhase === 'thanks') {
                content.innerHTML = `
                    <div class="thank-you-msg">
                        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="#059669" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <h3>Thank You!</h3>
                        <p>We appreciate your feedback. It helps us improve our service.</p>
                        <button class="submit-btn" style="margin-top:16px;" onclick="rateUsPhase='stars';selectedRating=0;loadRateUs(portalToken)">Rate Again</button>
                    </div>`;
                return;
            }

            if (rateUsPhase === 'google') {
                content.innerHTML = `
                    <div class="review-form-section" style="text-align:center;">
                        <svg width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="#f59e0b" stroke-width="1.5" style="margin-bottom:12px;"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                        <h3 style="font-size:20px;color:#1e2e2c;margin-bottom:8px;">We're glad you had a great experience!</h3>
                        <p style="color:#6b7280;margin-bottom:24px;">Would you mind sharing your experience on Google? It really helps us out!</p>
                        ${googleReviewUrl ? `
                            <a href="${escapeHtml(googleReviewUrl)}" target="_blank" rel="noopener" class="submit-btn" style="display:inline-block;text-decoration:none;padding:14px 32px;font-size:16px;">
                                Leave a Google Review
                            </a>` : `
                            <p style="color:#6b7280;font-size:13px;">Google review link is not configured yet. Please contact us to leave a review!</p>`}
                        <div style="margin-top:20px;">
                            <button style="background:none;border:none;color:#6b7280;font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit;" onclick="rateUsPhase='thanks';loadRateUs(portalToken)">No thanks, skip</button>
                        </div>
                    </div>`;
                return;
            }

            if (rateUsPhase === 'feedback') {
                content.innerHTML = `
                    <div class="review-form-section">
                        <div class="form-title">We'd love to hear more</div>
                        <p style="color:#6b7280;font-size:14px;margin-bottom:16px;">We're sorry your experience wasn't perfect. Your feedback helps us improve — it will only be seen by our team.</p>
                        <div class="form-row">
                            <label for="privateFeedback">What can we do better?</label>
                            <textarea id="privateFeedback" placeholder="Tell us what happened..." style="min-height:120px;"></textarea>
                        </div>
                        <button class="submit-btn" id="submitFeedbackBtn" onclick="submitPrivateFeedback()">Send Feedback</button>
                        <div id="feedbackMessage"></div>
                    </div>`;
                return;
            }

            // Default: star selection phase
            content.innerHTML = `
                <div class="review-form-section" style="text-align:center;">
                    <div class="form-title" style="text-align:center;">How was your experience?</div>
                    <p style="color:#6b7280;font-size:14px;margin-bottom:20px;">Tap a star to rate us</p>
                    <div class="star-rating" id="starRating">
                        ${[1,2,3,4,5].map(i => `<span class="star empty" data-value="${i}" onclick="selectRating(${i})" onmouseover="hoverRating(${i})" onmouseout="unhoverRating()">&#9734;</span>`).join('')}
                    </div>
                    <div id="ratingLabel" style="margin-top:12px;font-size:14px;color:#6b7280;min-height:20px;"></div>
                </div>`;
            selectedRating = 0;
        }

        const ratingLabels = ['', 'Poor', 'Fair', 'Good', 'Great', 'Excellent'];

        function selectRating(value) {
            selectedRating = value;
            updateStars(value);
            // Show label briefly, then transition
            const label = document.getElementById('ratingLabel');
            if (label) label.textContent = ratingLabels[value] || '';

            setTimeout(() => {
                if (value >= 4) {
                    rateUsPhase = 'google';
                } else {
                    rateUsPhase = 'feedback';
                }
                // Also store the rating via API for tracking
                fetch(`/api/portal/${portalToken}/reviews`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rating: value, comment: value >= 4 ? 'Redirected to Google Reviews' : null })
                }).catch(() => {});
                loadRateUs(portalToken);
            }, 600);
        }

        function hoverRating(value) {
            updateStars(value);
            const label = document.getElementById('ratingLabel');
            if (label) label.textContent = ratingLabels[value] || '';
        }

        function unhoverRating() {
            updateStars(selectedRating);
            const label = document.getElementById('ratingLabel');
            if (label) label.textContent = selectedRating ? ratingLabels[selectedRating] : '';
        }

        function updateStars(value) {
            const stars = document.querySelectorAll('#starRating .star');
            stars.forEach(star => {
                const v = parseInt(star.dataset.value);
                if (v <= value) {
                    star.classList.remove('empty');
                    star.classList.add('filled');
                    star.innerHTML = '\u2605';
                } else {
                    star.classList.remove('filled');
                    star.classList.add('empty');
                    star.innerHTML = '\u2606';
                }
            });
        }

        async function submitPrivateFeedback() {
            const feedback = document.getElementById('privateFeedback').value.trim();
            const msgEl = document.getElementById('feedbackMessage');
            const btn = document.getElementById('submitFeedbackBtn');

            if (!feedback) {
                msgEl.innerHTML = '<div class="message message-error" style="margin-top:12px;">Please enter your feedback.</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';
            msgEl.innerHTML = '';

            try {
                // Update the review with the feedback comment
                await fetch(`/api/portal/${portalToken}/reviews`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rating: selectedRating || 3, comment: feedback })
                });

                rateUsPhase = 'thanks';
                loadRateUs(portalToken);
            } catch (err) {
                msgEl.innerHTML = `<div class="message message-error" style="margin-top:12px;">Something went wrong. Please try again.</div>`;
                btn.textContent = 'Send Feedback';
                btn.disabled = false;
            }
        }

        // ── My Profile Tab (renamed from Account) ─────────────────────────
        function renderProfile() {
            const c = customerData || {};
            const name = c.name || [c.first_name, c.last_name].filter(Boolean).join(' ') || '-';
            const email = c.email || '-';
            const phone = c.phone || '-';
            const address = formatAddress(c);

            document.getElementById('tabContent').innerHTML = `
                <div class="account-section">
                    <div class="account-field">
                        <div class="account-label">Name</div>
                        <div class="account-value">${escapeHtml(name)}</div>
                    </div>
                    <div class="account-field">
                        <div class="account-label">Email</div>
                        <div class="account-value">${escapeHtml(email)}</div>
                    </div>
                    <div class="account-field">
                        <div class="account-label">Phone</div>
                        <div class="account-value">${escapeHtml(phone)}</div>
                    </div>
                    ${address ? `
                    <div class="account-field">
                        <div class="account-label">Address</div>
                        <div class="account-value">${escapeHtml(address)}</div>
                    </div>` : ''}
                    <div class="account-actions">
                        <button onclick="requestNewLink()">Request New Access Link</button>
                    </div>

                    <div class="saved-cards-section">
                        <div class="section-heading">Saved Cards</div>
                        <div id="savedCardsList"><div class="loading"><div class="spinner"></div></div></div>
                    </div>

                    <div class="prefs-section">
                        <div class="section-heading">Communication Preferences</div>
                        <div id="prefsContainer">
                            <div class="loading"><div class="spinner"></div></div>
                        </div>
                    </div>
                </div>`;

            // Load saved cards and communication preferences
            loadSavedCards(portalToken);
            loadPreferences();
        }

        function formatAddress(c) {
            if (c.address) return c.address;
            const parts = [c.street, c.city, c.state, c.zip].filter(Boolean);
            return parts.length ? parts.join(', ') : '';
        }

        async function requestNewLink() {
            const email = customerData?.email;
            if (!email) return;

            const btn = document.querySelector('.account-actions button');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch('/api/portal/request-access', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Something went wrong');

                btn.textContent = 'Link Sent!';
            } catch (err) {
                btn.textContent = 'Request New Access Link';
                btn.disabled = false;
                alert(err.message);
            }
        }

        // ── Communication Preferences ────────────────────────────────────
        async function loadPreferences() {
            const container = document.getElementById('prefsContainer');
            if (!container) return;

            try {
                const res = await fetch(`/api/portal/${portalToken}/preferences`);
                let prefs = {};
                if (res.ok) {
                    const data = await res.json();
                    prefs = data.preferences || data || {};
                }

                const emailInvoices = prefs.email_invoices !== undefined ? prefs.email_invoices : true;
                const emailReminders = prefs.email_reminders !== undefined ? prefs.email_reminders : true;
                const emailMarketing = prefs.email_marketing !== undefined ? prefs.email_marketing : false;
                const smsReminders = prefs.sms_reminders !== undefined ? prefs.sms_reminders : false;
                const smsMarketing = prefs.sms_marketing !== undefined ? prefs.sms_marketing : false;

                container.innerHTML = `
                    <div class="pref-row">
                        <span class="pref-label">Email invoices</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="prefEmailInvoices" ${emailInvoices ? 'checked' : ''}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="pref-row">
                        <span class="pref-label">Email reminders</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="prefEmailReminders" ${emailReminders ? 'checked' : ''}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="pref-row">
                        <span class="pref-label">Email marketing</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="prefEmailMarketing" ${emailMarketing ? 'checked' : ''}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="pref-row">
                        <span class="pref-label">SMS reminders</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="prefSmsReminders" ${smsReminders ? 'checked' : ''}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="pref-row">
                        <span class="pref-label">SMS marketing</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="prefSmsMarketing" ${smsMarketing ? 'checked' : ''}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <button class="save-prefs-btn" id="savePrefsBtn" onclick="savePreferences()">Save Preferences</button>
                    <div id="prefsMessage"></div>`;
            } catch (err) {
                container.innerHTML = '<p style="font-size:13px;color:#6b7280;">Could not load preferences.</p>';
            }
        }

        async function savePreferences() {
            const btn = document.getElementById('savePrefsBtn');
            const msgEl = document.getElementById('prefsMessage');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            msgEl.innerHTML = '';

            const prefs = {
                email_invoices: document.getElementById('prefEmailInvoices').checked,
                email_reminders: document.getElementById('prefEmailReminders').checked,
                email_marketing: document.getElementById('prefEmailMarketing').checked,
                sms_reminders: document.getElementById('prefSmsReminders').checked,
                sms_marketing: document.getElementById('prefSmsMarketing').checked
            };

            try {
                const res = await fetch(`/api/portal/${portalToken}/preferences`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(prefs)
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Failed to save preferences');
                }

                msgEl.innerHTML = '<div class="message message-success" style="margin-top:12px;">Preferences saved!</div>';
                btn.textContent = 'Save Preferences';
                btn.disabled = false;
            } catch (err) {
                msgEl.innerHTML = `<div class="message message-error" style="margin-top:12px;">${escapeHtml(err.message)}</div>`;
                btn.textContent = 'Save Preferences';
                btn.disabled = false;
            }
        }

        // ── Utility Functions ───────────────────────────────────────────
        function formatCurrency(amt) {
            const num = typeof amt === 'string' ? parseFloat(amt) : amt;
            if (isNaN(num)) return '$0.00';
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(num / 100);
        }

        function formatDate(d) {
            if (!d) return '';
            const date = new Date(d);
            if (isNaN(date.getTime())) return d;
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Allow Enter key to submit the email form
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('emailInput');
            if (emailInput) {
                emailInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') requestAccess();
                });
            }
            const reRequestInput = document.getElementById('reRequestEmail');
            if (reRequestInput) {
                reRequestInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') requestAccessFromError();
                });
            }
        });

        // Boot
        init();
    </script>
</body>
</html>
