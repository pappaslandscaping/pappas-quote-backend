<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Detail | YardDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>

        :root {
            --forest: #2e403d;
            --forest-dark: #1f2b29;
            --forest-light: #3a524e;
            --lime: #c9dd80;
            --lime-soft: #dce9a8;
            --white: #ffffff;
            --gray-50: #f8faf8;
            --gray-100: #f0f2f0;
            --gray-200: #e2e5e2;
            --gray-300: #c8ccc8;
            --gray-400: #9ca09c;
            --gray-500: #6e726e;
            --gray-600: #4a4e4a;
            --gray-700: #333633;
            --red: #dc4a4a;
            --red-bg: #fef0f0;
            --green: #22c55e;
            --green-bg: #f0fdf4;
            --amber: #f59e0b;
            --amber-bg: #fffbeb;
            --blue: #3b82f6;
            --blue-bg: #eff6ff;
            --sidebar-w: 240px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--gray-700); }

        /* Sidebar */
        
        
        
        
        
        
        
        
        
        
        
        
        
        

        /* Main */
        
        
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        
        .back-link { display: flex; align-items: center; gap: 6px; color: var(--gray-500); text-decoration: none; font-size: 13px; font-weight: 500; }
        .back-link:hover { color: var(--forest); }
        .content { padding: 32px; max-width: 900px; }

        /* Detail Cards */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .detail-card {
            background: var(--white); border-radius: 12px; border: 1px solid var(--gray-200);
            padding: 20px;
        }
        .detail-card.full-width { grid-column: 1 / -1; }
        .detail-card h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-400); margin-bottom: 12px; }
        .detail-field { margin-bottom: 10px; }
        .detail-field .label { font-size: 11px; color: var(--gray-400); margin-bottom: 2px; }
        .detail-field .value { font-size: 14px; font-weight: 500; color: var(--gray-700); }

        /* Status Badge */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; text-transform: capitalize;
        }
        .status-badge.draft { background: var(--gray-100); color: var(--gray-500); }
        .status-badge.pending { background: var(--amber-bg); color: var(--amber); }
        .status-badge.partial { background: #fff7ed; color: #c2410c; }
        .status-badge.sent { background: var(--blue-bg); color: var(--blue); }
        .status-badge.viewed { background: var(--amber-bg); color: var(--amber); }
        .status-badge.paid { background: var(--green-bg); color: var(--green); }
        .status-badge.overdue { background: var(--red-bg); color: var(--red); }
        .status-badge.void { background: var(--gray-100); color: var(--gray-400); }

        /* Line Items Table */
        .line-items-table { width: 100%; border-collapse: collapse; }
        .line-items-table th {
            text-align: left; padding: 10px 12px;
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--gray-400); border-bottom: 2px solid var(--gray-200);
        }
        .line-items-table th:last-child { text-align: right; }
        .line-items-table td {
            padding: 12px; font-size: 14px;
            border-bottom: 1px solid var(--gray-100);
        }
        .line-items-table td:last-child { text-align: right; font-weight: 600; }
        .totals-row { border-top: 2px solid var(--lime); }
        .totals-row td { font-weight: 700; font-size: 16px; color: var(--forest); padding-top: 16px; }

        /* Payment Info */
        .payment-card {
            background: var(--green-bg); border: 1px solid #bbf7d0; border-radius: 10px;
            padding: 16px 20px; margin-bottom: 20px;
        }
        .payment-card h4 { font-size: 13px; color: var(--green); margin-bottom: 8px; }
        .payment-card .detail { font-size: 13px; color: #166534; margin-bottom: 4px; }

        .overdue-card {
            background: var(--red-bg); border: 1px solid #fecaca; border-radius: 10px;
            padding: 16px 20px; margin-bottom: 20px;
        }
        .overdue-card h4 { font-size: 13px; color: var(--red); margin-bottom: 8px; }
        .overdue-card .detail { font-size: 13px; color: #991b1b; }

        /* Actions */
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 24px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: 8px;
            font-size: 13px; font-weight: 600; border: none; cursor: pointer;
            transition: all 0.15s; text-decoration: none;
        }
        .btn-primary { background: var(--forest); color: white; }
        .btn-primary:hover { background: var(--forest-dark); }
        .btn-success { background: var(--green); color: white; }
        .btn-success:hover { opacity: 0.9; }
        .btn-outline { background: none; border: 1px solid var(--gray-300); color: var(--gray-600); }
        .btn-outline:hover { background: var(--gray-100); }
        .btn-danger { background: none; border: 1px solid var(--red); color: var(--red); }
        .btn-danger:hover { background: var(--red-bg); }

        /* QB Badge */
        .qb-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 6px;
            background: #e8f5e3; color: #2ca01c;
            font-size: 11px; font-weight: 600;
        }

        /* Loading */
        .loading { text-align: center; padding: 60px 20px; color: var(--gray-400); font-size: 14px; }

        /* Toast */
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--forest); color: white; padding: 12px 24px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* Payment History */
        .payment-history { margin-top: 16px; }
        .payment-entry {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--gray-100);
            font-size: 13px;
        }
        .payment-entry:last-child { border-bottom: none; }
        .payment-entry .method { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; background: var(--gray-100); font-size: 11px; font-weight: 600; color: var(--gray-600); }
        .payment-entry .amount { font-weight: 700; color: var(--green); }
        .payment-entry-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
        .payment-status {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 999px;
            font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
        }
        .payment-status.completed { background: var(--green-bg); color: var(--green); }
        .payment-status.pending { background: var(--amber-bg); color: var(--amber); }
        .payment-status.failed { background: var(--red-bg); color: var(--red); }

        /* Pay Link */
        .pay-link-box {
            display: flex; align-items: center; gap: 8px;
            background: var(--gray-50); border: 1px solid var(--gray-200);
            border-radius: 8px; padding: 8px 12px; margin-top: 8px;
        }
        .pay-link-box input {
            flex: 1; border: none; background: none; font-size: 12px;
            color: var(--gray-600); font-family: monospace; outline: none;
        }
        .pay-link-box button {
            padding: 4px 10px; border: 1px solid var(--gray-300);
            border-radius: 4px; background: white; font-size: 11px;
            font-weight: 600; cursor: pointer; white-space: nowrap;
        }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1000; display: none;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 12px; padding: 28px;
            max-width: 440px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--gray-700); }
        .modal .form-group { margin-bottom: 14px; }
        .modal .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-500); margin-bottom: 4px; }
        .modal .form-group input, .modal .form-group select, .modal .form-group textarea {
            width: 100%; padding: 8px 12px; border: 1px solid var(--gray-200);
            border-radius: 6px; font-size: 13px; font-family: inherit;
        }

        /* Payment Schedule */
        .schedule-table { width: 100%; border-collapse: collapse; }
        .schedule-table th {
            text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--gray-400); border-bottom: 2px solid var(--gray-200);
        }
        .schedule-table th:last-child, .schedule-table td:last-child { text-align: center; }
        .schedule-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--gray-100); }
        .schedule-pill {
            display: inline-flex; padding: 2px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 600;
        }
        .schedule-pill.paid { background: var(--green-bg); color: var(--green); }
        .schedule-pill.upcoming { background: var(--blue-bg); color: var(--blue); }
        .schedule-pill.overdue { background: var(--red-bg); color: var(--red); }
        .split-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
        .split-row:last-child { border-bottom: none; }
        .split-row .num { width: 28px; height: 28px; border-radius: 50%; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--gray-500); flex-shrink: 0; }
        .split-row input { flex: 1; }
        .split-total { display: flex; justify-content: space-between; padding: 12px 0; font-weight: 700; font-size: 14px; border-top: 2px solid var(--lime); margin-top: 8px; }
        .split-total.mismatch { color: var(--red); }
        /* Edit Modal */
        .edit-modal .modal { max-width: 640px; }
        .edit-modal .line-item-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .edit-modal .line-item-row input { padding: 8px 10px; border: 1px solid var(--gray-200); border-radius: 6px; font-size: 13px; font-family: inherit; }
        .edit-modal .line-item-row input.li-desc { flex: 3; }
        .edit-modal .line-item-row input.li-date { flex: 1.2; }
        .edit-modal .line-item-row input.li-qty { flex: 0.7; text-align: center; }
        .edit-modal .line-item-row input.li-rate { flex: 1; text-align: right; }
        .edit-modal .line-item-row .li-amount { flex: 1; text-align: right; font-weight: 600; font-size: 13px; color: var(--gray-600); min-width: 70px; }
        .edit-modal .line-item-row .li-remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 18px; padding: 4px; flex-shrink: 0; }
        .edit-modal .line-item-row .li-remove:hover { background: var(--red-bg); border-radius: 4px; }
        .edit-li-header { display: flex; gap: 8px; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-400); font-weight: 600; }
        .edit-li-header span:nth-child(1) { flex: 3; }
        .edit-li-header span:nth-child(2) { flex: 1.2; }
        .edit-li-header span:nth-child(3) { flex: 0.7; text-align: center; }
        .edit-li-header span:nth-child(4) { flex: 1; text-align: right; }
        .edit-li-header span:nth-child(5) { flex: 1; text-align: right; min-width: 70px; }
        .edit-li-header span:nth-child(6) { width: 26px; }
        .btn-add-line { background: none; border: 1px dashed var(--gray-300); color: var(--gray-500); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; width: 100%; margin-top: 4px; }
        .btn-add-line:hover { border-color: var(--forest); color: var(--forest); }

        /* Invoice History Timeline */
        .history-timeline { position: relative; padding-left: 24px; }
        .history-timeline::before { content: ''; position: absolute; left: 8px; top: 8px; bottom: 8px; width: 2px; background: var(--gray-200); }
        .history-event { position: relative; margin-bottom: 16px; }
        .history-event:last-child { margin-bottom: 0; }
        .history-event::before {
            content: ''; position: absolute; left: -20px; top: 4px;
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--gray-300); border: 2px solid var(--white);
        }
        .history-event.created::before { background: var(--gray-400); }
        .history-event.sent::before { background: var(--blue); }
        .history-event.viewed::before { background: var(--amber); }
        .history-event.paid::before { background: var(--green); }
        .history-event.reminder::before { background: #8b5cf6; }
        .history-event.overdue::before { background: var(--red); }
        .history-event.payment-pending::before { background: var(--amber); }
        .history-event.payment-failed::before { background: var(--red); }
        .history-event.email-failed::before { background: var(--red); }
        .history-event.receipt::before { background: var(--green); }
        .history-event.notice::before { background: var(--forest-light); }
        .history-event-badge {
            display: inline-flex; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
        }
        .history-event-badge.created { background: var(--gray-100); color: var(--gray-500); }
        .history-event-badge.sent { background: var(--blue-bg); color: var(--blue); }
        .history-event-badge.viewed { background: var(--amber-bg); color: var(--amber); }
        .history-event-badge.paid { background: var(--green-bg); color: var(--green); }
        .history-event-badge.reminder { background: #f5f3ff; color: #8b5cf6; }
        .history-event-badge.overdue { background: var(--red-bg); color: var(--red); }
        .history-event-badge.payment-pending { background: var(--amber-bg); color: var(--amber); }
        .history-event-badge.payment-failed,
        .history-event-badge.email-failed { background: var(--red-bg); color: var(--red); }
        .history-event-badge.receipt { background: var(--green-bg); color: var(--green); }
        .history-event-badge.notice { background: #eef2f2; color: var(--forest-light); }
        .history-event-title { font-size: 13px; font-weight: 500; color: var(--gray-700); margin-top: 4px; }
        .history-event-detail { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
        .history-event-date { font-size: 11px; color: var(--gray-400); margin-left: 8px; }

        /* Print Styles */
        @media print {
            .sidebar, .topbar, .actions, .pay-link-box, #breadcrumb,
            .modal-overlay, .toast { display: none !important; }
            .main { margin-left: 0 !important; padding: 0 !important; }
            .content { padding: 20px 0 !important; max-width: 100% !important; }
            body { background: white !important; }
            .detail-card, .payment-card, .overdue-card { break-inside: avoid; border: 1px solid #ddd !important; }
            .print-header { display: flex !important; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 3px solid #2e403d; }
            .print-header .company { font-family: 'DM Sans', sans-serif; font-size: 22px; color: #2e403d; font-weight: 700; }
            .print-header .company-sub { font-size: 12px; color: #6e726e; margin-top: 4px; }
            .print-header .inv-info { text-align: right; }
            .print-header .inv-number { font-size: 20px; font-weight: 700; color: #2e403d; }
            .print-header .inv-due { font-size: 13px; color: #4a4e4a; margin-top: 4px; }
        }
        .print-header { display: none; }
    </style>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
<script src="shell.js"></script>
<main class="main">
        <div class="topbar">
            <div class="topbar-left">
                <div style="display:flex;flex-direction:column;gap:2px;">
                    <div id="breadcrumb" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-400);">
                        <a href="invoices.html" style="color:var(--gray-400);text-decoration:none;">Invoices</a>
                        <span>/</span>
                        <span id="breadcrumbInv">Invoice</span>
                    </div>
                    <h1 id="pageTitle">Invoice</h1>
                </div>
            </div>
        </div>

        <div class="content" id="invoiceContent">
            <div class="loading">Loading invoice...</div>
        </div>
    </main>

    <div class="modal-overlay" id="recordPaymentModal">
        <div class="modal">
            <h3>Record Manual Payment</h3>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="rpAmount" step="0.01" min="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select id="rpMethod">
                    <option value="cash">Cash</option>
                    <option value="check">Check</option>
                    <option value="credit_card">Credit Card (offline)</option>
                    <option value="debit_card">Debit Card (offline)</option>
                    <option value="venmo">Venmo</option>
                    <option value="zelle">Zelle</option>
                    <option value="ach">ACH/Bank Transfer</option>
                    <option value="money_order">Money Order</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes (optional)</label>
                <textarea id="rpNotes" rows="2" placeholder="Check #, reference, etc."></textarea>
            </div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button class="btn btn-outline" style="flex:1;" onclick="hideRecordPayment()">Cancel</button>
                <button class="btn btn-success" style="flex:1;" onclick="recordPayment()">Record Payment</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="splitPaymentModal">
        <div class="modal" style="max-width:520px;">
            <h3>Split Into Payment Schedule</h3>
            <div class="form-group">
                <label>Number of Installments</label>
                <select id="spCount" onchange="generateInstallmentRows()">
                    <option value="2">2 Installments</option>
                    <option value="3">3 Installments</option>
                    <option value="4">4 Installments</option>
                    <option value="6">6 Installments</option>
                    <option value="12">12 Installments</option>
                </select>
            </div>
            <div id="spRows"></div>
            <div class="split-total" id="spTotal"></div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button class="btn btn-outline" style="flex:1;" onclick="hideSplitPayment()">Cancel</button>
                <button class="btn btn-primary" style="flex:1;" onclick="savePaymentSchedule()">Save Schedule</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="chargeCardModal">
        <div class="modal" style="max-width:420px;">
            <h3>Charge Card on File</h3>
            <div id="chargeCardContent" style="min-height:60px;">
                <p style="color:var(--gray-500);text-align:center;">Loading saved cards...</p>
            </div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button class="btn btn-outline" style="flex:1;" onclick="hideChargeCard()">Cancel</button>
                <button class="btn btn-success" style="flex:1;" id="chargeCardBtn" onclick="chargeSelectedCard()" disabled>Charge Card</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay edit-modal" id="editInvoiceModal">
        <div class="modal">
            <h3>Edit Invoice</h3>
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="editCustName">
            </div>
            <div class="form-group">
                <label>Customer Email</label>
                <input type="email" id="editCustEmail">
            </div>
            <div class="form-group">
                <label>Customer Address</label>
                <input type="text" id="editCustAddress">
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="editDueDate">
            </div>
            <div class="form-group">
                <label>Line Items</label>
                <div class="edit-li-header">
                    <span>Description</span>
                    <span>Date</span>
                    <span>Qty</span>
                    <span>Rate</span>
                    <span>Amount</span>
                    <span></span>
                </div>
                <div id="editLineItems"></div>
                <button type="button" class="btn-add-line" onclick="addEditLineItem()">+ Add Line Item</button>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding:8px 0;border-top:2px solid var(--lime);">
                <strong style="font-size:14px;">Total</strong>
                <strong style="font-size:16px;color:var(--forest);" id="editTotal">$0.00</strong>
            </div>
            <div class="form-group" style="margin-top:14px;">
                <label>Notes</label>
                <textarea id="editNotes" rows="3" placeholder="Internal notes..."></textarea>
            </div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button class="btn btn-outline" style="flex:1;" onclick="hideEditModal()">Cancel</button>
                <button class="btn btn-primary" style="flex:1;" onclick="saveInvoiceEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const invoiceId = new URLSearchParams(window.location.search).get('id');
        if (!invoiceId) window.location.href = 'invoices.html';

        let invoice = null;
        let paymentSchedule = [];

        loadInvoice();

        async function loadInvoice() {
            try {
                const res = await fetch(`/api/invoices/${invoiceId}`);
                if (!res.ok) throw new Error('Failed to fetch invoice');
                const data = await res.json();
                invoice = data.invoice || data;
                // Load payment schedule
                try {
                    const sRes = await fetch(`/api/invoices/${invoiceId}/payment-schedule`);
                    if (sRes.ok) {
                        const sData = await sRes.json();
                        paymentSchedule = sData.schedule || [];
                    }
                } catch(e) { paymentSchedule = []; }
                renderInvoice();
            } catch (e) {
                document.getElementById('invoiceContent').innerHTML =
                    '<div class="loading">Invoice not found. <a href="invoices.html">Back to invoices</a></div>';
            }
        }

        function renderInvoice() {
            const inv = invoice;
            const invNum = inv.invoice_number || 'INV-' + inv.id;
            const custName = inv.customer_name || 'Unknown Customer';
            const custEmail = inv.customer_email || '';
            const custAddress = inv.customer_address || '';
            const status = inv.status || 'draft';
            const sentStatus = (inv.sent_status || (inv.external_metadata && inv.external_metadata.sent_status) || '').toLowerCase();
            const total = parseFloat(inv.total) || 0;
            const amountPaid = parseFloat(inv.amount_paid) || 0;
            const balance = total - amountPaid;
            const dueDate = inv.due_date;
            const paidAt = inv.paid_at;
            const sentAt = inv.sent_at;
            const createdAt = inv.created_at;
            const notes = inv.notes || '';
            const terms = inv.terms || (inv.external_metadata && inv.external_metadata.terms_raw) || '';
            const qbId = inv.qb_invoice_id;
            const statusLabel = humanizeLabel(status);
            const sentStatusLabel = humanizeLabel(sentStatus);

            let lineItems = inv.line_items || [];
            if (typeof lineItems === 'string') {
                try { lineItems = JSON.parse(lineItems); } catch(e) { lineItems = []; }
            }

            document.getElementById('pageTitle').textContent = invNum;
            // Breadcrumb
            var bc = '<a href="invoices.html" style="color:var(--gray-400);text-decoration:none;">Invoices</a><span style="margin:0 4px">/</span>';
            if (inv.customer_id) {
                bc += '<a href="customer-detail.html?id=' + inv.customer_id + '" style="color:var(--primary);text-decoration:none;">' + esc(custName) + '</a><span style="margin:0 4px">/</span>';
            }
            bc += '<span style="color:var(--gray-600)">' + esc(invNum) + '</span>';
            document.getElementById('breadcrumb').innerHTML = bc;

            // Build the payment/overdue info card
            let paymentHtml = '';
            if (status === 'paid') {
                const isPartial = amountPaid < total;
                paymentHtml = `<div class="payment-card">
                    <h4>✓ ${isPartial ? 'Partial Payment Received' : 'Payment Received in Full'}</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px 24px; margin-top:8px;">
                        <div class="detail"><strong>Amount paid:</strong> ${formatCurrency(amountPaid)}</div>
                        ${isPartial ? `<div class="detail"><strong>Balance remaining:</strong> ${formatCurrency(balance)}</div>` : `<div class="detail"><strong>Invoice total:</strong> ${formatCurrency(total)}</div>`}
                        ${paidAt ? `<div class="detail"><strong>Payment date:</strong> ${formatDate(paidAt)}</div>` : ''}
                        ${dueDate ? `<div class="detail"><strong>Due date:</strong> ${formatDate(dueDate)}</div>` : ''}
                        ${qbId ? `<div class="detail"><strong>QuickBooks ID:</strong> ${qbId}</div>` : ''}
                        ${inv.customer_email ? `<div class="detail"><strong>Billing email:</strong> ${inv.customer_email}</div>` : ''}
                    </div>
                </div>`;
            } else if (amountPaid > 0 && status !== 'paid') {
                // Partial payment on a non-"paid" status invoice
                paymentHtml = `<div class="payment-card" style="background:#fffbeb; border-color:#fde68a;">
                    <h4 style="color:#d97706;">⚡ Partial Payment — ${formatCurrency(amountPaid)} of ${formatCurrency(total)}</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px 24px; margin-top:8px;">
                        <div class="detail" style="color:#92400e;"><strong>Remaining:</strong> ${formatCurrency(balance)}</div>
                        ${paidAt ? `<div class="detail" style="color:#92400e;"><strong>Last payment:</strong> ${formatDate(paidAt)}</div>` : ''}
                        ${dueDate ? `<div class="detail" style="color:#92400e;"><strong>Due date:</strong> ${formatDate(dueDate)}</div>` : ''}
                    </div>
                </div>`;
            } else if (status === 'overdue') {
                const daysOverdue = dueDate ? Math.ceil((new Date() - new Date(dueDate)) / (1000*60*60*24)) : 0;
                paymentHtml = `<div class="overdue-card">
                    <h4>⚠ Overdue${daysOverdue > 0 ? ` — ${daysOverdue} days` : ''}</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px 24px; margin-top:8px;">
                        <div class="detail"><strong>Balance due:</strong> ${formatCurrency(balance)}</div>
                        <div class="detail"><strong>Invoice total:</strong> ${formatCurrency(total)}</div>
                        ${dueDate ? `<div class="detail"><strong>Due date:</strong> ${formatDate(dueDate)}</div>` : ''}
                        ${qbId ? `<div class="detail"><strong>QuickBooks ID:</strong> ${qbId}</div>` : ''}
                    </div>
                </div>`;
            } else if (status === 'pending') {
                paymentHtml = `<div style="background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:16px; margin-bottom:20px;">
                    <h4 style="color:#b45309; font-size:13px; margin-bottom:8px;">📝 Invoice Pending${sentStatus === 'not sent' ? ' — Not Sent' : ''}</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px 24px;">
                        <div class="detail" style="color:#92400e;"><strong>Amount due:</strong> ${formatCurrency(balance || total)}</div>
                        ${dueDate ? `<div class="detail" style="color:#92400e;"><strong>Due date:</strong> ${formatDate(dueDate)}</div>` : ''}
                    </div>
                </div>`;
            } else if (status === 'sent') {
                paymentHtml = `<div style="background:#eff6ff; border:1px solid #bfdbfe; border-radius:10px; padding:16px; margin-bottom:20px;">
                    <h4 style="color:#1d4ed8; font-size:13px; margin-bottom:8px;">📬 Invoice Sent — Awaiting Payment</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px 24px;">
                        <div class="detail" style="color:#1e40af;"><strong>Amount due:</strong> ${formatCurrency(total)}</div>
                        ${dueDate ? `<div class="detail" style="color:#1e40af;"><strong>Due date:</strong> ${formatDate(dueDate)}</div>` : ''}
                    </div>
                </div>`;
            }

            // Line items table
            let lineItemsHtml = '';
            if (lineItems.length > 0) {
                const rows = lineItems.map(item => {
                    const name = item.name || item.description || 'Service';
                    const qty = item.quantity || item.qty || 1;
                    const rate = parseFloat(item.rate || item.unit_price || item.amount || 0);
                    const amount = parseFloat(item.line_total || item.amount || (qty * rate) || 0);
                    const dateStr = item.service_date ? new Date(item.service_date + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';
                    return `<tr>
                        <td>
                            <div>${esc(name)}</div>
                            ${item.property_name ? `<div style="font-size:12px;color:var(--gray-400);margin-top:2px;">&#8627; ${esc(item.property_name)}</div>` : ''}
                        </td>
                        <td>${dateStr}</td>
                        <td>${qty}</td>
                        <td>${formatCurrency(rate)}</td>
                        <td>${formatCurrency(amount)}</td>
                    </tr>`;
                }).join('');

                lineItemsHtml = `<table class="line-items-table">
                    <thead><tr><th>Service</th><th>Date</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
                    <tbody>
                        ${rows}
                        <tr class="totals-row">
                            <td colspan="4">Total</td>
                            <td>${formatCurrency(total)}</td>
                        </tr>
                        ${amountPaid > 0 && status !== 'paid' ? `<tr>
                            <td colspan="4" style="color:var(--gray-500);font-size:13px;">Amount Paid</td>
                            <td style="color:var(--green);font-size:13px;">${formatCurrency(amountPaid)}</td>
                        </tr>
                        <tr>
                            <td colspan="4" style="font-weight:700;">Balance Due</td>
                            <td style="font-weight:700;">${formatCurrency(balance)}</td>
                        </tr>` : ''}
                    </tbody>
                </table>`;
            } else {
                lineItemsHtml = `<div style="text-align:center;padding:20px;color:var(--gray-400);">
                    <div style="font-size:14px;">Total: <strong style="font-size:20px;color:var(--forest);">${formatCurrency(total)}</strong></div>
                </div>`;
            }

            const html = `
                <div class="print-header">
                    <div>
                        <div class="company">Pappas & Co. Landscaping</div>
                        <div class="company-sub">Cleveland, OH</div>
                    </div>
                    <div class="inv-info">
                        <div class="inv-number">${esc(invNum)}</div>
                        <div class="inv-due">Due: ${dueDate ? formatDate(dueDate) : 'Upon receipt'}</div>
                    </div>
                </div>

                ${paymentHtml}

                <div class="detail-grid">
                    <div class="detail-card">
                        <h3>Customer</h3>
                        <div class="detail-field">
                            <div class="value" style="font-size:16px;font-weight:700;">${inv.customer_id ? `<a href="customer-detail.html?id=${inv.customer_id}" style="color:inherit;text-decoration:none;border-bottom:1px dashed var(--gray-300)">${esc(custName)}</a>` : esc(custName)}</div>
                        </div>
                        ${custEmail ? `<div class="detail-field"><div class="label">Email</div><div class="value"><a href="mailto:${esc(custEmail)}" style="color:var(--blue);text-decoration:none;">${esc(custEmail)}</a></div></div>` : ''}
                        ${custAddress ? `<div class="detail-field"><div class="label">Address</div><div class="value">${esc(custAddress)}</div></div>` : ''}
                        ${inv.customer_id ? `<div class="detail-field"><div class="label">Customer ID</div><div class="value"><a href="customer-detail.html?id=${inv.customer_id}" style="color:var(--forest);text-decoration:none;">#${inv.customer_id}</a></div></div>` : ''}
                    </div>

                    <div class="detail-card">
                        <h3>Invoice Info</h3>
                        <div class="detail-field">
                            <div class="label">Status</div>
                            <div class="value"><span class="status-badge ${status}">${esc(statusLabel)}</span></div>
                        </div>
                        ${sentStatus ? `<div class="detail-field"><div class="label">Sending</div><div class="value">${esc(sentStatusLabel)}</div></div>` : ''}
                        <div class="detail-field">
                            <div class="label">Invoice #</div>
                            <div class="value">${esc(invNum)}</div>
                        </div>
                        <div class="detail-field"><div class="label">Due Date</div><div class="value">${dueDate ? formatDate(dueDate) : 'Due upon receipt'}</div></div>
                        ${createdAt ? `<div class="detail-field"><div class="label">Created</div><div class="value">${formatDate(createdAt)}</div></div>` : ''}
                        ${sentAt ? `<div class="detail-field"><div class="label">Sent</div><div class="value">${formatDate(sentAt)}</div></div>` : ''}
                        ${qbId ? `<div class="detail-field"><div class="label">QuickBooks</div><div class="value"><span class="qb-badge">QB #${esc(qbId)}</span></div></div>` : ''}
                    </div>
                </div>

                <div class="detail-card full-width" style="margin-bottom:20px;">
                    <h3>Line Items</h3>
                    ${lineItemsHtml}
                </div>

                ${renderPaymentSchedule()}

                ${inv.payment_history && inv.payment_history.length > 0 ? `
                <div class="detail-card full-width" style="margin-bottom:20px;">
                    <h3>Payment History</h3>
                    <div class="payment-history">
                        ${inv.payment_history.map(p => `
                            <div class="payment-entry">
                                <div>
                                    <span class="method">${{'card':'💳 Card','credit_card':'💳 Credit Card','debit_card':'💳 Debit Card','ach':'🏦 ACH','apple_pay':'🍎 Apple Pay','cash':'💵 Cash','check':'📝 Check','venmo':'Venmo','zelle':'Zelle','money_order':'📝 Money Order'}[p.method] || '💰 ' + (p.method || 'Payment')}</span>
                                    <div class="payment-entry-meta">
                                        <span class="payment-status ${paymentStatusClass(p.status)}">${esc(paymentStatusLabel(p.status))}</span>
                                        ${p.card_last4 ? '<span style="font-size:11px;color:var(--gray-400);">•••• ' + esc(p.card_last4) + '</span>' : ''}
                                        ${p.square_receipt_url ? '<a href="' + p.square_receipt_url + '" target="_blank" style="font-size:11px;color:var(--blue);">Receipt</a>' : ''}
                                    </div>
                                </div>
                                <div style="text-align:right;">
                                    <div class="amount">${formatCurrency(p.amount)}</div>
                                    <div style="font-size:11px;color:var(--gray-400);">${formatDate(p.paid_at || p.created_at)}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>` : ''}

                ${inv.payment_token ? `
                <div class="detail-card full-width" style="margin-bottom:20px;">
                    <h3>Customer Pay Link</h3>
                    <p style="font-size:12px;color:var(--gray-400);margin-bottom:8px;">Share this link so your customer can pay online</p>
                    <div class="pay-link-box">
                        <input type="text" id="payLinkInput" value="${window.location.origin}/pay-invoice.html?token=${inv.payment_token}" readonly>
                        <button onclick="copyPayLink()">Copy</button>
                    </div>
                </div>` : ''}

                ${notes ? `<div class="detail-card full-width" style="margin-bottom:20px;">
                    <h3>Notes</h3>
                    <p style="font-size:14px;color:var(--gray-600);line-height:1.6;white-space:pre-wrap;">${esc(notes)}</p>
                </div>` : ''}

                ${terms ? `<div class="detail-card full-width" style="margin-bottom:20px;">
                    <h3>Terms</h3>
                    <p style="font-size:14px;color:var(--gray-600);line-height:1.6;white-space:pre-wrap;">${esc(terms)}</p>
                </div>` : ''}

                <div class="detail-card full-width" style="margin-bottom:20px;">
                    <h3>Invoice History</h3>
                    <div class="history-timeline">
                        ${buildInvoiceHistory(inv)}
                    </div>
                </div>

                <div class="actions">
                    ${status === 'draft' || (status === 'pending' && sentStatus === 'not sent') ? `<button class="btn btn-primary" onclick="sendInvoice()">📤 Send Invoice</button>` : ''}
                    ${['pending', 'partial', 'sent', 'overdue'].includes(status) ? `<button class="btn btn-success" onclick="markPaid()">💰 Mark as Paid</button>` : ''}
                    ${status === 'sent' || status === 'overdue' || (status === 'pending' && sentStatus && sentStatus !== 'not sent') ? `<button class="btn btn-outline" onclick="sendInvoice()">📤 Resend</button>` : ''}
                    <button class="btn btn-outline" onclick="showEditModal()">✏️ Edit</button>
                    <button class="btn btn-outline" onclick="window.print()">🖨 Print</button>
                    ${status !== 'paid' && status !== 'void' ? `<button class="btn btn-outline" onclick="showRecordPayment()">💵 Record Payment</button>` : ''}
                    ${status !== 'paid' && status !== 'void' ? `<button class="btn btn-outline" onclick="showSplitPayment()">📅 Split Payments</button>` : ''}
                    ${['pending', 'partial', 'sent', 'overdue'].includes(status) ? `<button class="btn btn-outline" onclick="showChargeCard()">💳 Charge Card on File</button>` : ''}
                    ${['partial', 'sent', 'overdue'].includes(status) ? `<button class="btn btn-outline" onclick="sendReminder()">🔔 Send Reminder</button>` : ''}
                    <button class="btn btn-outline" onclick="downloadPDF()">📥 Download PDF</button>
                    <button class="btn btn-danger" onclick="deleteInvoice()">Delete</button>
                </div>
            `;

            document.getElementById('invoiceContent').innerHTML = html;
        }

        async function sendInvoice() {
            try {
                const res = await fetch(`/api/invoices/${invoiceId}/send`, { method: 'POST' });
                const data = await res.json();
                if (data.success) { showToast('Invoice sent!'); loadInvoice(); }
                else showToast(data.error || 'Send failed', true);
            } catch (e) { showToast('Send failed', true); }
        }

        async function markPaid() {
            try {
                const res = await fetch(`/api/invoices/${invoiceId}/mark-paid`, { method: 'PATCH' });
                const data = await res.json();
                if (data.success) { showToast('Marked as paid!'); loadInvoice(); }
                else showToast(data.error || 'Failed', true);
            } catch (e) { showToast('Failed', true); }
        }

        async function deleteInvoice() {
            if (!confirm('Delete this invoice? This cannot be undone.')) return;
            try {
                const res = await fetch(`/api/invoices/${invoiceId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    showToast('Invoice deleted');
                    setTimeout(() => window.location.href = 'invoices.html', 1000);
                } else showToast(data.error || 'Delete failed', true);
            } catch (e) { showToast('Delete failed', true); }
        }

        function formatCurrency(amt) {
            return '$' + parseFloat(amt || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatDateTime(d) {
            if (!d) return '';
            return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
        }

        function humanizeLabel(value) {
            return String(value || '')
                .trim()
                .replace(/[_-]+/g, ' ')
                .replace(/\s+/g, ' ')
                .split(' ')
                .filter(Boolean)
                .map(part => part.charAt(0).toUpperCase() + part.slice(1))
                .join(' ');
        }

        function paymentStatusClass(status) {
            const normalized = String(status || '').trim().toLowerCase();
            if (normalized === 'pending') return 'pending';
            if (normalized === 'failed') return 'failed';
            return 'completed';
        }

        function paymentStatusLabel(status) {
            const normalized = String(status || '').trim().toLowerCase();
            if (normalized === 'pending') return 'Pending';
            if (normalized === 'failed') return 'Failed';
            return 'Completed';
        }

        function buildInvoiceHistory(inv) {
            if (Array.isArray(inv.history_events) && inv.history_events.length > 0) {
                return inv.history_events.map(e => `
                    <div class="history-event ${esc(e.type || 'created')}">
                        <span class="history-event-badge ${esc(e.type || 'created')}">${esc(e.badge || 'Update')}</span>
                        <span class="history-event-date">${formatDateTime(e.date)}</span>
                        <div class="history-event-title">${esc(e.title || '')}</div>
                        ${e.detail ? `<div class="history-event-detail">${esc(e.detail)}</div>` : ''}
                    </div>
                `).join('');
            }

            const events = [];

            // Created
            if (inv.created_at) {
                events.push({
                    type: 'created',
                    date: new Date(inv.created_at),
                    badge: 'Created',
                    title: 'Invoice created',
                    detail: inv.invoice_number ? `#${inv.invoice_number}` : ''
                });
            }

            // Sent
            if (inv.sent_at) {
                events.push({
                    type: 'sent',
                    date: new Date(inv.sent_at),
                    badge: 'Sent by Email',
                    title: `Invoice delivered to ${inv.customer_name || 'customer'}`,
                    detail: inv.customer_email ? `Sent to: ${inv.customer_email}` : ''
                });
            }

            // Viewed
            if (inv.viewed_at) {
                events.push({
                    type: 'viewed',
                    date: new Date(inv.viewed_at),
                    badge: 'Viewed',
                    title: `Viewed by customer`,
                    detail: ''
                });
            }

            // Reminders
            if (inv.reminder_sent_at) {
                events.push({
                    type: 'reminder',
                    date: new Date(inv.reminder_sent_at),
                    badge: 'Reminder Sent',
                    title: `Payment reminder sent${inv.reminder_count > 1 ? ` (${inv.reminder_count} total)` : ''}`,
                    detail: inv.customer_email ? `Sent to: ${inv.customer_email}` : ''
                });
            }

            // Overdue
            if (inv.due_date && (inv.status === 'overdue' || inv.status === 'sent') && new Date(inv.due_date) < new Date() && parseFloat(inv.amount_paid || 0) < parseFloat(inv.total || 0)) {
                events.push({
                    type: 'overdue',
                    date: new Date(inv.due_date),
                    badge: 'Overdue',
                    title: 'Invoice became overdue',
                    detail: `Due date: ${formatDate(inv.due_date)}`
                });
            }

            // Payments
            if (inv.payment_history && inv.payment_history.length > 0) {
                for (const p of inv.payment_history) {
                    const methodMap = {card:'Credit Card',credit_card:'Credit Card',debit_card:'Debit Card',ach:'ACH Bank Transfer',apple_pay:'Apple Pay',cash:'Cash',check:'Check',venmo:'Venmo',zelle:'Zelle',money_order:'Money Order'};
                    const methodLabel = methodMap[p.method] || p.method || 'Payment';
                    events.push({
                        type: 'paid',
                        date: new Date(p.paid_at || p.created_at),
                        badge: 'Payment Received',
                        title: `${formatCurrency(p.amount)} via ${methodLabel}`,
                        detail: p.card_last4 ? `Card ending in ${p.card_last4}` : (p.ach_bank_name ? `Bank: ${p.ach_bank_name}` : '')
                    });
                }
            } else if (inv.paid_at && inv.status === 'paid') {
                events.push({
                    type: 'paid',
                    date: new Date(inv.paid_at),
                    badge: 'Paid',
                    title: `Payment received — ${formatCurrency(inv.total)}`,
                    detail: ''
                });
            }

            // Sort newest first
            events.sort((a, b) => b.date - a.date);

            if (events.length === 0) {
                return '<p style="font-size:13px;color:var(--gray-400);">No history yet.</p>';
            }

            return events.map(e => `
                <div class="history-event ${e.type}">
                    <span class="history-event-badge ${e.type}">${e.badge}</span>
                    <span class="history-event-date">${formatDateTime(e.date)}</span>
                    <div class="history-event-title">${esc(e.title)}</div>
                    ${e.detail ? `<div class="history-event-detail">${esc(e.detail)}</div>` : ''}
                </div>
            `).join('');
        }

        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? 'var(--red)' : 'var(--forest)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        function copyPayLink() {
            const input = document.getElementById('payLinkInput');
            input.select();
            navigator.clipboard.writeText(input.value);
            showToast('Pay link copied!');
        }

        let selectedCardId = null;

        async function showChargeCard() {
            selectedCardId = null;
            document.getElementById('chargeCardBtn').disabled = true;
            document.getElementById('chargeCardContent').innerHTML = '<p style="color:var(--gray-500);text-align:center;">Loading saved cards...</p>';
            document.getElementById('chargeCardModal').classList.add('show');
            try {
                const customerId = invoice.customer_id;
                const res = await fetch(`/api/customers/${customerId}/saved-cards`, { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                if (!data.success || !data.cards.length) {
                    document.getElementById('chargeCardContent').innerHTML = '<p style="color:var(--gray-500);text-align:center;">No saved cards on file for this customer.</p>';
                    return;
                }
                const balance = (parseFloat(invoice.total) - parseFloat(invoice.amount_paid || 0)).toFixed(2);
                let html = `<p style="margin-bottom:12px;font-size:14px;color:var(--gray-600);">Charge <strong>$${balance}</strong> to:</p>`;
                data.cards.forEach(card => {
                    const exp = card.exp_month && card.exp_year ? ` (${String(card.exp_month).padStart(2,'0')}/${String(card.exp_year).slice(-2)})` : '';
                    html += `<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:8px;cursor:pointer;">
                        <input type="radio" name="chargeCard" value="${card.id}" onchange="selectedCardId=${card.id};document.getElementById('chargeCardBtn').disabled=false;">
                        <span style="font-size:14px;font-weight:500;">${card.card_brand || 'Card'} •••• ${card.card_last4 || '????'}${exp}</span>
                    </label>`;
                });
                document.getElementById('chargeCardContent').innerHTML = html;
            } catch (e) {
                document.getElementById('chargeCardContent').innerHTML = '<p style="color:var(--red-500);text-align:center;">Failed to load cards.</p>';
            }
        }

        function hideChargeCard() {
            document.getElementById('chargeCardModal').classList.remove('show');
        }

        async function chargeSelectedCard() {
            if (!selectedCardId) return;
            const btn = document.getElementById('chargeCardBtn');
            btn.disabled = true;
            btn.textContent = 'Charging...';
            try {
                const res = await fetch(`/api/invoices/${invoiceId}/charge-card`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ card_id: selectedCardId })
                });
                const data = await res.json();
                if (data.success) {
                    hideChargeCard();
                    showToast('Card charged successfully!');
                    loadInvoice();
                } else {
                    showToast(data.error || 'Charge failed', true);
                    btn.disabled = false;
                    btn.textContent = 'Charge Card';
                }
            } catch (e) {
                showToast('Charge failed', true);
                btn.disabled = false;
                btn.textContent = 'Charge Card';
            }
        }

        function showRecordPayment() {
            document.getElementById('rpAmount').value = (parseFloat(invoice.total) - parseFloat(invoice.amount_paid || 0)).toFixed(2);
            document.getElementById('recordPaymentModal').classList.add('show');
        }

        function hideRecordPayment() {
            document.getElementById('recordPaymentModal').classList.remove('show');
        }

        async function recordPayment() {
            const amount = parseFloat(document.getElementById('rpAmount').value);
            const method = document.getElementById('rpMethod').value;
            const notes = document.getElementById('rpNotes').value;
            if (!amount || amount <= 0) { showToast('Enter a valid amount', true); return; }
            try {
                const res = await fetch(`/api/invoices/${invoiceId}/record-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, method, notes })
                });
                const data = await res.json();
                if (data.success) { showToast('Payment recorded!'); hideRecordPayment(); loadInvoice(); }
                else showToast(data.error || 'Failed', true);
            } catch (e) { showToast('Failed to record payment', true); }
        }

        async function sendReminder() {
            if (!confirm('Send a payment reminder to ' + (invoice.customer_email || 'customer') + '?')) return;
            try {
                const res = await fetch(`/api/invoices/${invoiceId}/send-reminder`, { method: 'POST' });
                const data = await res.json();
                if (data.success) showToast('Reminder sent!');
                else showToast(data.error || 'Failed', true);
            } catch (e) { showToast('Failed to send reminder', true); }
        }

        async function downloadPDF() {
            try {
                const res = await fetch(`/api/invoices/${invoiceId}/pdf`);
                if (!res.ok) throw new Error('Download failed');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `invoice-${invoice.invoice_number || invoiceId}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch(e) { showToast('Failed to download PDF', true); }
        }

        // Payment Schedule
        function renderPaymentSchedule() {
            if (!paymentSchedule || paymentSchedule.length === 0) return '';
            const today = new Date().toISOString().split('T')[0];
            const rows = paymentSchedule.map((inst, i) => {
                const isPaid = inst.paid;
                const isOverdue = !isPaid && inst.due_date < today;
                const statusClass = isPaid ? 'paid' : isOverdue ? 'overdue' : 'upcoming';
                const statusLabel = isPaid ? 'Paid' : isOverdue ? 'Overdue' : 'Upcoming';
                return `<tr>
                    <td>#${i + 1}</td>
                    <td>${formatDate(inst.due_date)}</td>
                    <td style="font-weight:600;">${formatCurrency(inst.amount)}</td>
                    <td><span class="schedule-pill ${statusClass}">${statusLabel}</span></td>
                </tr>`;
            }).join('');
            return `<div class="detail-card full-width" style="margin-bottom:20px;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h3>Payment Schedule</h3>
                    <span style="font-size:12px;color:var(--gray-400);">${paymentSchedule.length} installments</span>
                </div>
                <table class="schedule-table">
                    <thead><tr><th>#</th><th>Due Date</th><th>Amount</th><th>Status</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
        }

        function showSplitPayment() {
            document.getElementById('splitPaymentModal').classList.add('show');
            generateInstallmentRows();
        }

        function hideSplitPayment() {
            document.getElementById('splitPaymentModal').classList.remove('show');
        }

        function generateInstallmentRows() {
            const count = parseInt(document.getElementById('spCount').value);
            const total = parseFloat(invoice.total) - parseFloat(invoice.amount_paid || 0);
            const perInstallment = Math.floor(total / count * 100) / 100;
            const remainder = Math.round((total - perInstallment * count) * 100) / 100;
            const today = new Date();
            let html = '';
            for (let i = 0; i < count; i++) {
                const due = new Date(today);
                due.setMonth(due.getMonth() + i + 1);
                const amt = i === count - 1 ? (perInstallment + remainder).toFixed(2) : perInstallment.toFixed(2);
                html += `<div class="split-row">
                    <div class="num">${i + 1}</div>
                    <input type="date" class="sp-date" value="${due.toISOString().split('T')[0]}" style="padding:6px 8px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;font-family:inherit;">
                    <input type="number" class="sp-amount" value="${amt}" step="0.01" min="0.01" oninput="updateSplitTotal()" style="width:110px;padding:6px 8px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;font-family:inherit;text-align:right;">
                </div>`;
            }
            document.getElementById('spRows').innerHTML = html;
            updateSplitTotal();
        }

        function updateSplitTotal() {
            const total = parseFloat(invoice.total) - parseFloat(invoice.amount_paid || 0);
            const amounts = [...document.querySelectorAll('.sp-amount')].map(el => parseFloat(el.value) || 0);
            const sum = amounts.reduce((a, b) => a + b, 0);
            const match = Math.abs(sum - total) < 0.02;
            document.getElementById('spTotal').innerHTML = `<span>Installment Total: ${formatCurrency(sum)}</span><span>Invoice Balance: ${formatCurrency(total)}</span>`;
            document.getElementById('spTotal').className = 'split-total' + (match ? '' : ' mismatch');
        }

        // --- Edit Invoice ---
        function showEditModal() {
            const inv = invoice;
            document.getElementById('editCustName').value = inv.customer_name || '';
            document.getElementById('editCustEmail').value = inv.customer_email || '';
            document.getElementById('editCustAddress').value = inv.customer_address || '';
            document.getElementById('editDueDate').value = inv.due_date ? inv.due_date.split('T')[0] : '';
            document.getElementById('editNotes').value = inv.notes || '';

            let lineItems = inv.line_items || [];
            if (typeof lineItems === 'string') {
                try { lineItems = JSON.parse(lineItems); } catch(e) { lineItems = []; }
            }

            const container = document.getElementById('editLineItems');
            container.innerHTML = '';
            if (lineItems.length === 0) {
                addEditLineItem();
            } else {
                lineItems.forEach(item => {
                    const desc = item.name || item.description || '';
                    const qty = item.quantity || item.qty || 1;
                    const rate = parseFloat(item.rate || item.unit_price || item.amount || 0);
                    const sDate = item.service_date || '';
                    addEditLineItem(desc, qty, rate, sDate, item.property_name || '');
                });
            }
            updateEditTotal();
            document.getElementById('editInvoiceModal').classList.add('show');
        }

        function hideEditModal() {
            document.getElementById('editInvoiceModal').classList.remove('show');
        }

        function addEditLineItem(desc, qty, rate, serviceDate, propertyName) {
            desc = desc || '';
            qty = qty || 1;
            rate = rate || 0;
            serviceDate = serviceDate || '';
            propertyName = propertyName || '';
            const container = document.getElementById('editLineItems');
            const row = document.createElement('div');
            row.className = 'line-item-row';
            row.innerHTML = `
                <input type="text" class="li-desc" value="${esc(desc)}" placeholder="Description">
                <input type="text" class="li-property" value="${esc(propertyName)}" placeholder="Property name" style="flex:2;font-size:12px;color:#6b7280;">
                <input type="date" class="li-date" value="${serviceDate}">
                <input type="number" class="li-qty" value="${qty}" min="1" step="1" oninput="updateEditTotal()">
                <input type="number" class="li-rate" value="${parseFloat(rate).toFixed(2)}" min="0" step="0.01" oninput="updateEditTotal()">
                <span class="li-amount">${formatCurrency(qty * rate)}</span>
                <button type="button" class="li-remove" onclick="removeEditLineItem(this)" title="Remove">&times;</button>
            `;
            container.appendChild(row);
            updateEditTotal();
        }

        function removeEditLineItem(btn) {
            const container = document.getElementById('editLineItems');
            btn.closest('.line-item-row').remove();
            if (container.children.length === 0) addEditLineItem();
            updateEditTotal();
        }

        function updateEditTotal() {
            let total = 0;
            document.querySelectorAll('#editLineItems .line-item-row').forEach(row => {
                const qty = parseFloat(row.querySelector('.li-qty').value) || 0;
                const rate = parseFloat(row.querySelector('.li-rate').value) || 0;
                const amt = qty * rate;
                row.querySelector('.li-amount').textContent = formatCurrency(amt);
                total += amt;
            });
            document.getElementById('editTotal').textContent = formatCurrency(total);
        }

        async function saveInvoiceEdit() {
            const lineItems = [];
            let subtotal = 0;
            document.querySelectorAll('#editLineItems .line-item-row').forEach(row => {
                const desc = row.querySelector('.li-desc').value.trim();
                const propertyName = row.querySelector('.li-property') ? row.querySelector('.li-property').value.trim() : '';
                const serviceDate = row.querySelector('.li-date').value || null;
                const qty = parseFloat(row.querySelector('.li-qty').value) || 1;
                const rate = parseFloat(row.querySelector('.li-rate').value) || 0;
                const amount = qty * rate;
                if (desc || rate > 0) {
                    const item = { description: desc, name: desc, quantity: qty, qty: qty, rate: rate, unit_price: rate, amount: amount, service_date: serviceDate };
                    if (propertyName) item.property_name = propertyName;
                    lineItems.push(item);
                    subtotal += amount;
                }
            });

            const taxRate = parseFloat(invoice.tax_rate) || 0;
            const taxAmount = subtotal * (taxRate / 100);
            const total = subtotal + taxAmount;

            const dueDateVal = document.getElementById('editDueDate').value || null;

            const body = {
                customer_name: document.getElementById('editCustName').value.trim(),
                customer_email: document.getElementById('editCustEmail').value.trim(),
                customer_address: document.getElementById('editCustAddress').value.trim(),
                due_date: dueDateVal,
                notes: document.getElementById('editNotes').value.trim(),
                line_items: lineItems,
                subtotal: subtotal,
                tax_rate: taxRate,
                tax_amount: taxAmount,
                total: total
            };

            try {
                const res = await fetch(`/api/invoices/${invoiceId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success !== false) {
                    showToast('Invoice updated!');
                    hideEditModal();
                    loadInvoice();
                } else {
                    showToast(data.error || 'Failed to update invoice', true);
                }
            } catch (e) {
                showToast('Failed to update invoice', true);
            }
        }

        async function savePaymentSchedule() {
            const total = parseFloat(invoice.total) - parseFloat(invoice.amount_paid || 0);
            const dates = [...document.querySelectorAll('.sp-date')].map(el => el.value);
            const amounts = [...document.querySelectorAll('.sp-amount')].map(el => parseFloat(el.value) || 0);
            const sum = amounts.reduce((a, b) => a + b, 0);
            if (Math.abs(sum - total) > 0.02) { showToast('Installment amounts must equal the balance', true); return; }
            const installments = dates.map((d, i) => ({ due_date: d, amount: amounts[i] }));
            try {
                const res = await fetch(`/api/invoices/${invoiceId}/payment-schedule`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ installments })
                });
                const data = await res.json();
                if (data.success) { showToast('Payment schedule saved!'); hideSplitPayment(); loadInvoice(); }
                else showToast(data.error || 'Failed to save schedule', true);
            } catch (e) { showToast('Failed to save schedule', true); }
        }
    </script>
</body>
</html>
