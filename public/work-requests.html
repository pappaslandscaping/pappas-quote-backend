<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Requests — YardDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        .header h1, .topbar h1, h1 { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 28px; }
        .card-header h2, h2 { font-family: 'DM Sans', sans-serif; font-weight: 700; }
        .stat-card .number, .stat-value { font-family: 'DM Sans', sans-serif; font-weight: 700; }

        :root {
            --forest: #2e403d; --forest-dark: #1f2b29; --forest-light: #3a524e;
            --lime: #c9dd80; --lime-soft: #dce9a8; --white: #ffffff;
            --gray-50: #f8faf8; --gray-100: #f0f2f0; --gray-200: #e2e5e2;
            --gray-300: #c8ccc8; --gray-400: #9ca09c; --gray-500: #6e726e;
            --gray-600: #4a4e4a; --gray-700: #333633;
            --red: #dc4a4a; --red-bg: #fef0f0; --blue: #3b82f6; --blue-bg: #eff6ff;
            --amber: #d97706; --amber-bg: #fffbeb; --green: #059669; --green-bg: #ecfdf5;
            --purple: #7c3aed; --purple-bg: #f5f3ff;
            --sidebar-w: 240px; --header-h: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--gray-50); color: var(--gray-700); line-height: 1.5; }

        
        
        
        
        
        
        
        
        
        
        
        
        
        
        

        
        
        
        .content { flex: 1; padding: 32px; animation: fadeIn 0.4s ease; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 28px; }
        .stat-card { background: var(--white); border-radius: 12px; padding: 20px; border: 1px solid var(--gray-200); }
        .stat-label { font-size: 12px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--forest); }

        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 220px; position: relative; }
        .search-box input { width: 100%; padding: 10px 14px 10px 40px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 14px; background: var(--white); transition: all 0.15s; }
        .search-box input:focus { outline: none; border-color: var(--forest); box-shadow: 0 0 0 3px rgba(46,64,61,0.1); }
        .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--gray-400); }
        .filter-select { padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 14px; background: var(--white); min-width: 140px; cursor: pointer; }
        .filter-select:focus { outline: none; border-color: var(--forest); }

        .table-card { background: var(--white); border-radius: 12px; border: 1px solid var(--gray-200); overflow: hidden; }
        .table-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
        .table-header h2 { font-size: 16px; font-weight: 600; color: var(--forest); }
        .table-count { font-size: 13px; color: var(--gray-500); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 14px 20px; border-bottom: 1px solid var(--gray-100); }
        th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); background: var(--gray-50); }
        tbody tr { transition: all 0.15s; cursor: pointer; }
        tbody tr:hover { background: var(--gray-50); }

        .status-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-pending { background: var(--blue-bg); color: var(--blue); }
        .status-in-progress { background: var(--amber-bg); color: var(--amber); }
        .status-completed { background: var(--green-bg); color: var(--green); }
        .status-cancelled { background: var(--red-bg); color: var(--red); }

        .urgency-badge { display: inline-flex; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        .urgency-normal { background: var(--gray-100); color: var(--gray-600); }
        .urgency-urgent { background: var(--red-bg); color: var(--red); }
        .urgency-low { background: var(--green-bg); color: var(--green); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.2s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--white); border-radius: 16px; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; transform: scale(0.95); transition: transform 0.2s; }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 18px; font-weight: 600; color: var(--forest); }
        .modal-close { background: none; border: none; padding: 6px; cursor: pointer; color: var(--gray-400); border-radius: 6px; }
        .modal-close:hover { background: var(--gray-100); }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 12px; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .btn-primary { background: var(--forest); color: var(--lime); }
        .btn-primary:hover { background: var(--forest-dark); }
        .btn-secondary { background: var(--white); color: var(--forest); border: 1px solid var(--gray-200); }
        .btn-secondary:hover { background: var(--gray-50); }

        .detail-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .detail-label { font-size: 12px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .detail-value { font-size: 14px; color: var(--gray-700); }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state svg { width: 64px; height: 64px; color: var(--gray-300); margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--gray-600); margin-bottom: 8px; }
        .empty-state p { color: var(--gray-500); font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: var(--gray-500); }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--gray-200); border-top-color: var(--forest); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--forest); color: var(--white); padding: 14px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transform: translateY(20px); transition: all 0.3s; z-index: 2000; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: var(--red); }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; }
        .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 14px; font-family: inherit; }
        .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--forest); box-shadow: 0 0 0 3px rgba(46,64,61,0.1); }
        .form-group textarea { resize: vertical; min-height: 80px; }

        @media (max-width: 768px) {
            
            
            .content { padding: 20px; }
            table { display: block; overflow-x: auto; }
        }

/* Universal Search */
.universal-search-wrapper{position:relative;flex:1;max-width:380px;margin:0 24px}
.search-input-group{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:12px;width:18px;height:18px;color:var(--gray-400);pointer-events:none}
.search-input{width:100%;padding:8px 36px 8px 40px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;transition:all .2s}
.search-input:focus{outline:none;border-color:var(--forest);box-shadow:0 0 0 3px rgba(46,64,61,.1)}
.search-clear-btn{position:absolute;right:8px;background:none;border:none;cursor:pointer;padding:4px;color:#9ca09c;display:flex}
.search-clear-btn:hover{color:#4a4e4a}
.search-clear-btn svg{width:16px;height:16px}
.search-results-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e2e5e2;border-top:none;border-radius:0 0 8px 8px;max-height:400px;overflow-y:auto;box-shadow:0 8px 16px rgba(0,0,0,.1);z-index:200}
.search-results-group{padding:8px 0;border-bottom:1px solid #f0f2f0}
.search-results-group:last-child{border-bottom:none}
.search-group-label{padding:6px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca09c}
.search-result-item{display:flex;align-items:center;gap:12px;padding:10px 16px;text-decoration:none;cursor:pointer;transition:background .1s;color:#333633}
.search-result-item:hover{background:#f8faf8}
.search-result-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.search-result-icon.customer{background:#eff6ff;color:#3b82f6}
.search-result-icon.quote{background:#f5f3ff;color:#7c3aed}
.search-result-icon.property{background:#ecfdf5;color:#059669}
.search-result-content{flex:1;min-width:0}
.search-result-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-subtitle{font-size:12px;color:#6e726e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-empty{text-align:center;padding:24px 16px;color:#9ca09c;font-size:13px}
@media(max-width:768px){.universal-search-wrapper{display:none}}
    </style>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
<script src="shell.js"></script>
<main class="main">
    <header class="topbar">
        <h1>Work Requests</h1>
        <div class="universal-search-wrapper">
            <div class="search-input-group">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="universalSearch" class="search-input" placeholder="Search customers, quotes, properties... (⌘K)" autocomplete="off">
                <button id="searchClear" class="search-clear-btn" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div id="searchResults" class="search-results-dropdown" style="display:none"></div>
        </div>
    </header>

    <section class="content">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Requests</div>
                <div class="stat-value" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">New / Pending</div>
                <div class="stat-value" id="statPending" style="color:var(--blue)">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">In Progress</div>
                <div class="stat-value" id="statInProgress" style="color:var(--amber)">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Completed</div>
                <div class="stat-value" id="statCompleted" style="color:var(--green)">—</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="searchInput" placeholder="Search requests..." oninput="debounceSearch()">
            </div>
            <select class="filter-select" id="statusFilter" onchange="loadRequests()">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="in-progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>

        <div class="table-card">
            <div class="table-header">
                <h2>Service Requests</h2>
                <span class="table-count" id="tableCount">Loading...</span>
            </div>
            <div id="tableContainer">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </section>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="detailTitle">Request Details</h3>
            <button class="modal-close" onclick="closeDetailModal()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body" id="detailBody"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeDetailModal()">Close</button>
            <button class="btn btn-primary" id="saveStatusBtn" onclick="saveStatus()">Update Status</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let requests = [];
let searchTimeout;
let currentRequestId = null;

document.addEventListener('DOMContentLoaded', () => {
    loadStats();
    loadRequests();
});

async function loadStats() {
    try {
        const res = await fetch('/api/work-requests/stats');
        const data = await res.json();
        if (data.success) {
            const s = data.stats;
            document.getElementById('statTotal').textContent = (s.total || 0).toLocaleString();
            document.getElementById('statPending').textContent = (s.pending || 0).toLocaleString();
            document.getElementById('statInProgress').textContent = (s.in_progress || 0).toLocaleString();
            document.getElementById('statCompleted').textContent = (s.completed || 0).toLocaleString();
        }
    } catch(e) { console.error('Stats error:', e); }
}

async function loadRequests() {
    const search = document.getElementById('searchInput').value;
    const status = document.getElementById('statusFilter').value;
    const params = new URLSearchParams();
    if (search) params.set('search', search);
    if (status) params.set('status', status);

    try {
        const res = await fetch('/api/work-requests?' + params);
        const data = await res.json();
        if (data.success) {
            requests = data.requests || [];
            document.getElementById('tableCount').textContent = (data.total || requests.length) + ' requests';
            renderTable();
        }
    } catch(e) {
        console.error('Load error:', e);
        document.getElementById('tableContainer').innerHTML = '<div class="empty-state"><p>Error loading requests</p></div>';
    }
}

function renderTable() {
    if (!requests.length) {
        document.getElementById('tableContainer').innerHTML = `
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <h3>No work requests</h3>
                <p>Customer-submitted service requests will appear here</p>
            </div>`;
        return;
    }

    const rows = requests.map(r => {
        const statusClass = 'status-' + (r.status || 'pending').replace(' ', '-');
        const urgencyClass = 'urgency-' + (r.urgency || 'normal');
        const date = r.created_at ? new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
        const prefDate = r.preferred_date ? new Date(r.preferred_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';

        return `<tr onclick="openDetail(${r.id})">
            <td>${date}</td>
            <td style="font-weight:500;color:var(--forest)">${esc(r.customer_name || 'Unknown')}</td>
            <td>${esc(r.service_type || '—')}</td>
            <td style="font-size:13px;color:var(--gray-600)">${esc(r.customer_address || '—')}</td>
            <td>${prefDate}</td>
            <td><span class="urgency-badge ${urgencyClass}">${esc(r.urgency || 'normal')}</span></td>
            <td><span class="status-badge ${statusClass}">${esc(r.status || 'pending')}</span></td>
        </tr>`;
    }).join('');

    document.getElementById('tableContainer').innerHTML = `
        <table>
            <thead><tr>
                <th>Submitted</th>
                <th>Customer</th>
                <th>Service</th>
                <th>Address</th>
                <th>Preferred Date</th>
                <th>Urgency</th>
                <th>Status</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
}

function openDetail(id) {
    const r = requests.find(x => x.id === id);
    if (!r) return;
    currentRequestId = id;

    const date = r.created_at ? new Date(r.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '—';
    const prefDate = r.preferred_date ? new Date(r.preferred_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'No preference';

    document.getElementById('detailTitle').textContent = 'Request #' + r.id;
    document.getElementById('detailBody').innerHTML = `
        <div class="detail-row">
            <div><div class="detail-label">Customer</div><div class="detail-value">${r.customer_id ? '<a href="customer-detail.html?id=' + r.customer_id + '" style="color:var(--blue);text-decoration:none">' + esc(r.customer_name || 'Unknown') + '</a>' : esc(r.customer_name || 'Unknown')}</div></div>
            <div><div class="detail-label">Submitted</div><div class="detail-value">${date}</div></div>
        </div>
        <div class="detail-row">
            <div><div class="detail-label">Service Type</div><div class="detail-value">${esc(r.service_type || '—')}</div></div>
            <div><div class="detail-label">Preferred Date</div><div class="detail-value">${prefDate}</div></div>
        </div>
        <div class="detail-row">
            <div><div class="detail-label">Address</div><div class="detail-value">${esc(r.customer_address || '—')}</div></div>
            <div><div class="detail-label">Urgency</div><div class="detail-value"><span class="urgency-badge urgency-${r.urgency || 'normal'}">${esc(r.urgency || 'normal')}</span></div></div>
        </div>
        ${r.description ? `<div style="margin-bottom:16px"><div class="detail-label">Description</div><div class="detail-value">${esc(r.description)}</div></div>` : ''}
        <div class="form-group">
            <label>Status</label>
            <select id="detailStatus">
                <option value="pending" ${r.status === 'pending' ? 'selected' : ''}>Pending</option>
                <option value="in-progress" ${r.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                <option value="completed" ${r.status === 'completed' ? 'selected' : ''}>Completed</option>
                <option value="cancelled" ${r.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
            </select>
        </div>
        <div class="form-group">
            <label>Admin Notes</label>
            <textarea id="detailNotes" placeholder="Internal notes about this request...">${esc(r.admin_notes || '')}</textarea>
        </div>`;

    document.getElementById('detailModal').classList.add('active');
}

function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('active');
    currentRequestId = null;
}

async function saveStatus() {
    if (!currentRequestId) return;
    const status = document.getElementById('detailStatus').value;
    const admin_notes = document.getElementById('detailNotes').value;

    try {
        const res = await fetch('/api/work-requests/' + currentRequestId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status, admin_notes })
        });
        const data = await res.json();
        if (data.success) {
            showToast('Request updated');
            closeDetailModal();
            loadStats();
            loadRequests();
        } else {
            showToast(data.error || 'Error updating', true);
        }
    } catch(e) { showToast('Error updating request', true); }
}

function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(loadRequests, 300);
}

function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// Universal Search
let searchDebounceTimer=null;
function initUniversalSearch(){const i=document.getElementById('universalSearch'),r=document.getElementById('searchResults'),c=document.getElementById('searchClear');if(!i)return;document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();i.focus()}});i.addEventListener('input',()=>{clearTimeout(searchDebounceTimer);const q=i.value.trim();if(!q){r.style.display='none';c.style.display='none';return}c.style.display='flex';searchDebounceTimer=setTimeout(()=>performSearch(q),300)});c.addEventListener('click',()=>{i.value='';r.style.display='none';c.style.display='none';i.focus()});i.addEventListener('blur',()=>setTimeout(()=>r.style.display='none',200));i.addEventListener('keydown',e=>{if(e.key==='Escape'){r.style.display='none';i.blur()}})}
function searchEscHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
async function performSearch(query){const el=document.getElementById('searchResults');el.innerHTML='<div class="search-loading">Searching...</div>';el.style.display='block';try{const[cRes,qRes,pRes]=await Promise.all([fetch('/api/customers?search='+encodeURIComponent(query)+'&limit=5'),fetch('/api/sent-quotes?search='+encodeURIComponent(query)+'&limit=5'),fetch('/api/properties?search='+encodeURIComponent(query)+'&limit=5')]);const customers=((await cRes.json()).customers||[]).slice(0,4),quotes=((await qRes.json()).quotes||[]).slice(0,4),properties=((await pRes.json()).properties||[]).slice(0,4);let html='';if(customers.length){html+='<div class="search-results-group"><div class="search-group-label">Customers</div>';customers.forEach(c=>{html+='<a href="customer-detail.html?id='+c.id+'" class="search-result-item"><div class="search-result-icon customer">👤</div><div class="search-result-content"><div class="search-result-title">'+searchEscHtml(c.name||'Unknown')+'</div><div class="search-result-subtitle">'+searchEscHtml(c.email||c.phone||'')+'</div></div></a>'});html+='</div>'}if(quotes.length){html+='<div class="search-results-group"><div class="search-group-label">Quotes</div>';quotes.forEach(q=>{html+='<a href="sent-quotes.html?quote='+q.id+'" class="search-result-item"><div class="search-result-icon quote">📄</div><div class="search-result-content"><div class="search-result-title">Quote #'+searchEscHtml(q.quote_number||String(q.id))+'</div><div class="search-result-subtitle">'+searchEscHtml(q.customer_name||'Unknown')+'</div></div><span class="search-result-badge" style="background:#f5f3ff;color:#7c3aed;">'+searchEscHtml(q.status||'')+'</span></a>'});html+='</div>'}if(properties.length){html+='<div class="search-results-group"><div class="search-group-label">Properties</div>';properties.forEach(p=>{html+='<a href="properties.html?id='+p.id+'" class="search-result-item"><div class="search-result-icon property">🏠</div><div class="search-result-content"><div class="search-result-title">'+searchEscHtml(p.property_name||p.street||'Unnamed')+'</div><div class="search-result-subtitle">'+searchEscHtml([p.street,p.city,p.state].filter(Boolean).join(', '))+'</div></div></a>'});html+='</div>'}if(!html)html='<div class="search-empty">No results for "'+searchEscHtml(query)+'"</div>';el.innerHTML=html}catch(e){el.innerHTML='<div class="search-empty">Search failed.</div>'}}
document.addEventListener('DOMContentLoaded',initUniversalSearch);
</script>
</body>
</html>
