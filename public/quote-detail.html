<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Details — YardDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'Qualy'; src: url('Qualy.otf') format('opentype'); }
        h1, h2, .stat-value { font-family: 'Qualy', serif !important; }

        :root {
            --forest: #2e403d; --forest-dark: #1f2b29; --lime: #c9dd80; --lime-soft: #dce9a8;
            --white: #ffffff; --gray-50: #f8faf8; --gray-100: #f0f2f0; --gray-200: #e2e5e2;
            --gray-300: #c8ccc8; --gray-400: #9ca09c; --gray-500: #6e726e; --gray-600: #4a4e4a; --gray-700: #333633;
            --red: #dc4a4a; --red-bg: #fef0f0; --blue: #3b82f6; --blue-bg: #eff6ff;
            --amber: #d97706; --amber-bg: #fffbeb; --green: #059669; --green-bg: #ecfdf5;
            --purple: #7c3aed; --purple-bg: #f5f3ff; --sidebar-w: 240px; --header-h: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--gray-50); color: var(--gray-700); line-height: 1.5; }

        
        
        
        
        
        
        
        
        
        
        
        
        
        
        

        
        
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .topbar-left h2 { font-family: 'Qualy', serif; font-size: 28px; font-weight: 700; color: var(--forest); }
        .topbar-actions { display: flex; align-items: center; gap: 12px; }

        .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--gray-500); text-decoration: none; transition: all 0.15s; }
        .back-btn:hover { background: var(--gray-100); color: var(--forest); }
        .back-btn svg { width: 16px; height: 16px; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            text-decoration: none;
        }
        .btn svg { width: 16px; height: 16px; }
        .btn-primary {
            background: var(--forest);
            color: var(--lime);
        }
        .btn-primary:hover {
            background: var(--forest-dark, #1f2b29);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 64, 61, 0.15);
        }
        .btn-secondary { background: var(--white); color: var(--gray-600); border: 1px solid var(--gray-200); }
        .btn-secondary:hover { background: var(--gray-50); }

        .mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
        .mobile-menu-btn svg { width: 24px; height: 24px; color: var(--gray-600); }

        .page-content { padding: 28px 32px; }

        .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        .detail-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; overflow: hidden; }
        .detail-card-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
        .detail-card-header h3 { font-size: 14px; font-weight: 700; color: var(--gray-700); display: flex; align-items: center; gap: 8px; }
        .detail-card-header h3 svg { width: 16px; height: 16px; color: var(--gray-400); }
        .detail-card-body { padding: 20px; }

        .info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-size: 13px; color: var(--gray-400); font-weight: 500; min-width: 120px; }
        .info-value { font-size: 13px; color: var(--gray-700); font-weight: 600; text-align: right; flex: 1; }
        .info-value a { color: var(--forest); text-decoration: none; }
        .info-value a:hover { text-decoration: underline; }

        .property-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .property-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .property-tag svg { width: 14px; height: 14px; }
        .property-tag.yes { background: var(--green-bg); color: var(--green); }
        .property-tag.no { background: var(--gray-100); color: var(--gray-500); }
        .property-tag.unknown { background: var(--gray-100); color: var(--gray-400); }

        .service-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 8px; }
        .service-item:last-child { margin-bottom: 0; }
        .service-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--lime-soft); display: flex; align-items: center; justify-content: center; }
        .service-icon svg { width: 16px; height: 16px; color: var(--forest); }
        .service-name { font-size: 13px; font-weight: 600; color: var(--gray-700); }
        .package-badge { margin-left: auto; font-size: 10px; font-weight: 700; padding: 3px 8px; background: var(--forest); color: var(--lime); border-radius: 4px; text-transform: uppercase; }

        .notes-content { background: var(--gray-50); border-radius: 8px; padding: 14px; font-size: 13px; color: var(--gray-600); line-height: 1.6; font-style: italic; }
        .notes-empty { color: var(--gray-400); }

        .status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; text-transform: capitalize; }
        .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
        .status-new { background: var(--blue-bg); color: var(--blue); }
        .status-new::before { background: var(--blue); }
        .status-contacted { background: var(--amber-bg); color: var(--amber); }
        .status-contacted::before { background: var(--amber); }
        .status-quoted { background: var(--purple-bg); color: var(--purple); }
        .status-quoted::before { background: var(--purple); }
        .status-scheduled { background: var(--green-bg); color: var(--green); }
        .status-scheduled::before { background: var(--green); }
        .status-completed { background: var(--green-bg); color: var(--green); }
        .status-completed::before { background: var(--green); }
        .status-cancelled { background: var(--red-bg); color: var(--red); }
        .status-cancelled::before { background: var(--red); }

        .status-update { display: flex; gap: 10px; align-items: center; }
        .status-select { flex: 1; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; }
        .status-select:focus { outline: none; border-color: var(--lime); }

        .quick-actions-list { display: flex; flex-direction: column; gap: 10px; }
        .quick-action-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid var(--gray-200); background: var(--white); color: var(--gray-600); cursor: pointer; transition: all 0.15s; text-decoration: none; font-family: inherit; }
        .quick-action-btn:hover { border-color: var(--forest); color: var(--forest); }
        .quick-action-btn svg { width: 16px; height: 16px; }
        .quick-action-btn.danger { color: var(--red); border-color: var(--red); }
        .quick-action-btn.danger:hover { background: var(--red-bg); }

        .timeline-item { display: flex; gap: 12px; padding: 10px 0; }
        .timeline-dot { width: 8px; height: 8px; background: var(--lime); border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
        .timeline-content { flex: 1; }
        .timeline-title { font-size: 13px; font-weight: 600; color: var(--gray-700); }
        .timeline-time { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

        .loading-state, .error-state { text-align: center; padding: 80px 20px; color: var(--gray-400); }
        .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--gray-200); border-top-color: var(--forest); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
        .error-state p { font-size: 14px; margin-bottom: 20px; }

        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--forest); color: var(--lime); padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 1024px) { .detail-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            
            .sidebar.open { transform: translateX(0); }
            
            .mobile-menu-btn { display: block; }
            .page-content { padding: 20px 16px; }
            
        }
    </style>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
<script src="shell.js"></script>
<div class="main">
    <div class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="topbar-left">
                <a href="quotes.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
                <h2 id="pageTitle">Quote Details</h2>
            </div>
        </div>
        <div class="topbar-actions" id="topbarActions"></div>
    </div>

    <div class="page-content" id="pageContent">
        <div class="loading-state"><div class="loading-spinner"></div><p>Loading quote details...</p></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentQuote = null;
const urlParams = new URLSearchParams(window.location.search);
const quoteId = urlParams.get('id');

document.addEventListener('DOMContentLoaded', () => {
    if (!quoteId) { showError('No quote ID provided'); return; }
    loadQuote();
});

async function loadQuote() {
    try {
        const res = await fetch(`/api/quotes/${quoteId}`);
        const data = await res.json();
        if (!data.success || !data.quote) { showError('Quote not found'); return; }
        currentQuote = data.quote;
        renderQuote();
    } catch (e) { console.error('Load error:', e); showError('Failed to load quote'); }
}

function renderQuote() {
    const q = currentQuote;
    const questions = q.questions || {};
    
    // Map both camelCase and snake_case field names for compatibility
    const getField = (camel, snake) => questions[camel] || questions[snake] || null;
    const gate = getField('gate', 'gate');
    const dogs = getField('dogs', 'dogs');
    const overgrown = getField('lawnHeight', 'overgrown'); // lawnHeight in DB = overgrown display
    const backyardAccess = getField('backyardAccess', 'backyard_access');
    const contactMethod = getField('contactMethod', 'contact_method');
    const startTiming = getField('startTime', 'start_timing'); // startTime in DB
    
    document.getElementById('pageTitle').textContent = q.name;
    document.getElementById('topbarActions').innerHTML = `
        <a href="mailto:${esc(q.email)}" class="btn btn-secondary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Email</a>
        <a href="tel:${q.phone.replace(/\D/g, '')}" class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>Call</a>
    `;
    
    const packageNames = { 'essential': 'Essential Care', 'complete': 'Complete Care', 'premium': 'Premium Care' };
    const packageName = packageNames[q.package] || q.package || 'Individual Services';
    const services = Array.isArray(q.services) ? q.services : [];
    const submittedDate = new Date(q.created_at).toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });

    document.getElementById('pageContent').innerHTML = `
        <div class="detail-grid">
            <div class="left-col">
                <div class="detail-card">
                    <div class="detail-card-header">
                        <h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Contact Information</h3>
                        <span class="status-pill status-${q.status}">${q.status}</span>
                    </div>
                    <div class="detail-card-body">
                        <div class="info-row"><span class="info-label">Phone</span><span class="info-value"><a href="tel:${q.phone.replace(/\D/g, '')}">${esc(q.phone)}</a></span></div>
                        <div class="info-row"><span class="info-label">Email</span><span class="info-value"><a href="mailto:${esc(q.email)}">${esc(q.email)}</a></span></div>
                        <div class="info-row"><span class="info-label">Address</span><span class="info-value"><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q.address)}" target="_blank">${esc(q.address)}</a></span></div>
                        <div class="info-row"><span class="info-label">Source</span><span class="info-value">${esc(q.source) || '—'}</span></div>
                    </div>
                </div>

                <div class="detail-card" style="margin-top: 20px;">
                    <div class="detail-card-header"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Services Requested</h3></div>
                    <div class="detail-card-body">
                        <div class="service-item">
                            <div class="service-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
                            <span class="service-name">${packageName}</span>
                            ${q.package ? '<span class="package-badge">Package</span>' : ''}
                        </div>
                        ${services.map(s => `<div class="service-item"><div class="service-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><span class="service-name">${esc(s)}</span></div>`).join('')}
                    </div>
                </div>

                <div class="detail-card" style="margin-top: 20px;">
                    <div class="detail-card-header"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Property Details</h3></div>
                    <div class="detail-card-body">
                        <div class="property-tags">
                            ${renderTag('Gate', gate)}
                            ${renderTag('Dogs', dogs)}
                            ${renderTag('Overgrown (6"+)', overgrown)}
                            ${renderTag('Backyard Access', backyardAccess)}
                        </div>
                    </div>
                </div>

                <div class="detail-card" style="margin-top: 20px;">
                    <div class="detail-card-header"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Preferences</h3></div>
                    <div class="detail-card-body">
                        <div class="info-row"><span class="info-label">Contact Via</span><span class="info-value">${capitalize(contactMethod) || '—'}</span></div>
                        <div class="info-row"><span class="info-label">Start Timing</span><span class="info-value">${capitalize(startTiming) || '—'}</span></div>
                    </div>
                </div>

                <div class="detail-card" style="margin-top: 20px;">
                    <div class="detail-card-header"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Notes</h3></div>
                    <div class="detail-card-body">
                        ${q.notes ? `<div class="notes-content">${esc(q.notes)}</div>` : `<div class="notes-content notes-empty">No additional notes provided</div>`}
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="detail-card">
                    <div class="detail-card-header"><h3>Update Status</h3></div>
                    <div class="detail-card-body">
                        <div class="status-update">
                            <select class="status-select" id="statusSelect">
                                ${['new', 'contacted', 'quoted', 'scheduled', 'completed', 'cancelled'].map(s => `<option value="${s}" ${q.status === s ? 'selected' : ''}>${capitalize(s)}</option>`).join('')}
                            </select>
                            <button class="btn btn-primary" onclick="updateStatus()">Update</button>
                        </div>
                    </div>
                </div>

                <div class="detail-card" style="margin-top: 20px;">
                    <div class="detail-card-header"><h3>Quick Actions</h3></div>
                    <div class="detail-card-body">
                        <div class="quick-actions-list">
                            <a href="quote-generator.html?from_request=${quoteId}&name=${encodeURIComponent(q.name)}&email=${encodeURIComponent(q.email||'')}&phone=${encodeURIComponent(q.phone||'')}&address=${encodeURIComponent(q.address||'')}&package=${encodeURIComponent(q.package||'')}&services=${encodeURIComponent(JSON.stringify(services))}" class="quick-action-btn" style="background:var(--forest);color:var(--lime);font-weight:600;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>Create Quote</a>
                            <a href="quote-calculator.html?name=${encodeURIComponent(q.name)}&address=${encodeURIComponent(q.address||'')}" class="quick-action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>Use Calculator</a>
                            <button class="quick-action-btn danger" onclick="deleteQuote()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Delete Quote</button>
                        </div>
                    </div>
                </div>

                <div class="detail-card" style="margin-top: 20px;">
                    <div class="detail-card-header"><h3>Activity</h3></div>
                    <div class="detail-card-body">
                        <div class="timeline-item">
                            <div class="timeline-dot"></div>
                            <div class="timeline-content"><div class="timeline-title">Quote request submitted</div><div class="timeline-time">${submittedDate}</div></div>
                        </div>
                        ${q.updated_at && q.updated_at !== q.created_at ? `<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-title">Status updated to ${q.status}</div><div class="timeline-time">${new Date(q.updated_at).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' })}</div></div></div>` : ''}
                    </div>
                </div>
            </div>
        </div>
    `;
}

function renderTag(label, value) {
    const isYes = value && value.toLowerCase() === 'yes';
    const isNo = value && value.toLowerCase() === 'no';
    if (isYes) return `<span class="property-tag yes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>${label}</span>`;
    if (isNo) return `<span class="property-tag no"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>No ${label}</span>`;
    return `<span class="property-tag unknown">${label}: ${value || '—'}</span>`;
}

async function updateStatus() {
    const status = document.getElementById('statusSelect').value;
    try {
        const res = await fetch(`/api/quotes/${quoteId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
        const data = await res.json();
        if (data.success) { currentQuote.status = status; currentQuote.updated_at = new Date().toISOString(); renderQuote(); showToast('Status updated'); }
    } catch (e) { console.error('Update error:', e); showToast('Failed to update status'); }
}

async function deleteQuote() {
    if (!confirm('Are you sure you want to delete this quote request? This cannot be undone.')) return;
    try {
        const res = await fetch(`/api/quotes/${quoteId}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) { showToast('Quote deleted'); setTimeout(() => window.location.href = 'quotes.html', 1000); }
    } catch (e) { console.error('Delete error:', e); showToast('Failed to delete quote'); }
}

function showError(message) {
    document.getElementById('pageContent').innerHTML = `<div class="error-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${message}</p><a href="quotes.html" class="btn btn-primary">Back to Quotes</a></div>`;
}

function capitalize(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1).toLowerCase() : ''; }
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
</script>
</body>
