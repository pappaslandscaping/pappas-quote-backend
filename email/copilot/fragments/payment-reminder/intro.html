<div style="margin:0 auto;max-width:568px;background-color:#ffffff;">
  <table align="center" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#ffffff;width:100%;border-collapse:collapse;">
    <tbody>
      <tr>
        <td style="padding:30px 28px 10px 28px;text-align:left;">
          <div
            style="
              font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
              font-size:12px;
              font-weight:700;
              letter-spacing:0.8px;
              line-height:1.6;
              text-transform:uppercase;
              color:#3f8a3d;
            "
          >
            Payment Reminder
          </div>
          <div
            style="
              font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
              font-size:32px;
              font-weight:800;
              line-height:1.2;
              color:#1f2933;
              padding:10px 0 14px 0;
            "
          >
            A reminder about your invoice
          </div>
          <div
            style="
              font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
              font-size:17px;
              line-height:1.6;
              color:#2d3a45;

            Hi {{CUSTOMER_FIRST_NAME}},
          </div>
          <div
            style="
              font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
              font-size:16px;

            "

            This is a reminder that invoice {{INVOICE_NUMBER}} is due on {{INVOICE_DUE_DATE}}. You can review your account and make a secure payment online anytime through your customer portal.

      </tr>
    </tbody>
  </table>
