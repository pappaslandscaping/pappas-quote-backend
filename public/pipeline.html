<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline — YardDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        h1, h2, .stat-value { font-family: 'DM Sans', sans-serif; font-weight: 700; }

        :root {
            --forest: #2e403d; --forest-dark: #1f2b29;
            --lime: #c9dd80; --lime-soft: #dce9a8;
            --white: #ffffff; --gray-50: #f8faf8; --gray-100: #f0f2f0;
            --gray-200: #e2e5e2; --gray-300: #c8ccc8; --gray-400: #9ca09c;
            --gray-500: #6e726e; --gray-600: #4a4e4a; --gray-700: #333633;
            --red: #dc4a4a; --red-bg: #fef0f0;
            --blue: #3b82f6; --blue-bg: #eff6ff;
            --amber: #d97706; --amber-bg: #fffbeb;
            --green: #059669; --green-bg: #ecfdf5;
            --purple: #7c3aed; --purple-bg: #f5f3ff;
            --sidebar-w: 240px; --header-h: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--gray-50); color: var(--gray-700); line-height: 1.5; overflow-x: hidden; }

        
        
        
        
        
        
        
        
        
        
        
        
        
        
        

        
        
        .topbar-left h2 { font-size: 28px; color: var(--forest); }
        .topbar-left p { font-size: 13px; color: var(--gray-400); }
        .mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
        .mobile-menu-btn svg { width: 24px; height: 24px; color: var(--gray-600); }

        .page-content { padding: 24px 32px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Stats */
        .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 16px 20px; min-width: 160px; flex: 1; }
        .stat-card .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-400); margin-bottom: 4px; }
        .stat-card .stat-value { font-size: 26px; font-weight: 700; color: var(--forest); }

        /* Kanban Board */
        .kanban { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 20px; min-height: calc(100vh - 220px); }
        .kanban-col { min-width: 240px; width: 240px; flex-shrink: 0; display: flex; flex-direction: column; }
        .col-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; margin-bottom: 8px; border-radius: 8px; }
        .col-header h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
        .col-dot { width: 8px; height: 8px; border-radius: 50%; }
        .col-count { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: rgba(0,0,0,0.08); }
        .col-body { flex: 1; min-height: 100px; padding: 4px; border-radius: 8px; transition: background 0.2s, border 0.2s; border: 2px dashed transparent; }
        .col-body.drag-over { background: var(--lime-soft); border-color: var(--forest); }

        .col-new .col-header { background: var(--gray-100); color: var(--gray-600); }
        .col-new .col-dot { background: var(--gray-500); }
        .col-quoted .col-header { background: var(--amber-bg); color: var(--amber); }
        .col-quoted .col-dot { background: var(--amber); }
        .col-scheduled .col-header { background: var(--blue-bg); color: var(--blue); }
        .col-scheduled .col-dot { background: var(--blue); }
        .col-in_progress .col-header { background: var(--purple-bg); color: var(--purple); }
        .col-in_progress .col-dot { background: var(--purple); }
        .col-completed .col-header { background: var(--green-bg); color: var(--green); }
        .col-completed .col-dot { background: var(--green); }
        .col-invoiced .col-header { background: rgba(46,64,61,0.1); color: var(--forest); }
        .col-invoiced .col-dot { background: var(--forest); }

        /* Job Cards */
        .job-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 10px; padding: 14px; margin-bottom: 8px; cursor: grab; transition: all 0.15s; }
        .job-card:hover { border-color: var(--gray-300); box-shadow: 0 2px 8px rgba(0,0,0,0.06); transform: translateY(-1px); }
        .job-card.dragging { opacity: 0.5; transform: rotate(2deg); }
        .job-card .jc-customer { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .job-card .jc-service { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
        .job-card .jc-meta { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
        .job-card .jc-date { font-size: 11px; color: var(--gray-400); }
        .job-card .jc-price { font-size: 13px; font-weight: 700; color: var(--forest); }
        .job-card .jc-crew { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; background: var(--green-bg); color: var(--green); margin-top: 6px; }

        .loading-state { text-align: center; padding: 60px 20px; color: var(--gray-400); }
        .loading-spinner { width: 24px; height: 24px; border: 3px solid var(--gray-200); border-top-color: var(--forest); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--forest); color: var(--lime); padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            
            .sidebar.open { transform: translateX(0); }
            
            .mobile-menu-btn { display: block; }
            .page-content { padding: 16px; }
            
            .kanban { flex-direction: column; }
            .kanban-col { width: 100%; min-width: auto; }
        }
/* Universal Search */
.universal-search-wrapper{position:relative;flex:1;max-width:380px;margin:0 24px}
.search-input-group{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:12px;width:18px;height:18px;color:var(--gray-400);pointer-events:none}
.search-input{width:100%;padding:8px 36px 8px 40px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;transition:all .2s}
.search-input:focus{outline:none;border-color:var(--forest);box-shadow:0 0 0 3px rgba(46,64,61,.1)}
.search-clear-btn{position:absolute;right:8px;background:none;border:none;cursor:pointer;padding:4px;color:#9ca09c;display:flex}
.search-clear-btn:hover{color:#4a4e4a}
.search-clear-btn svg{width:16px;height:16px}
.search-results-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e2e5e2;border-top:none;border-radius:0 0 8px 8px;max-height:400px;overflow-y:auto;box-shadow:0 8px 16px rgba(0,0,0,.1);z-index:200}
.search-results-group{padding:8px 0;border-bottom:1px solid #f0f2f0}
.search-results-group:last-child{border-bottom:none}
.search-group-label{padding:6px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca09c}
.search-result-item{display:flex;align-items:center;gap:12px;padding:10px 16px;text-decoration:none;cursor:pointer;transition:background .1s;color:#333633}
.search-result-item:hover{background:#f8faf8}
.search-result-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.search-result-icon.customer{background:#eff6ff;color:#3b82f6}
.search-result-icon.quote{background:#f5f3ff;color:#7c3aed}
.search-result-icon.property{background:#ecfdf5;color:#059669}
.search-result-content{flex:1;min-width:0}
.search-result-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-subtitle{font-size:12px;color:#6e726e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-empty{text-align:center;padding:24px 16px;color:#9ca09c;font-size:13px}
@media(max-width:768px){.universal-search-wrapper{display:none}}
    </style>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
<script src="shell.js"></script>
<div class="main">
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="topbar-left"><h2>Pipeline</h2><p>Drag jobs between stages</p></div>
        </div>
        <div class="universal-search-wrapper">
            <div class="search-input-group">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="universalSearch" class="search-input" placeholder="Search customers, quotes, properties... (Cmd+K)" autocomplete="off">
                <button id="searchClear" class="search-clear-btn" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div id="searchResults" class="search-results-dropdown" style="display:none"></div>
        </div>
    </div>

    <div style="display:flex;gap:0;border-bottom:1px solid var(--gray-200);background:var(--white);padding:0 32px;">
        <a href="reports.html" style="padding:10px 20px;font-size:13px;font-weight:500;color:var(--gray-500);border-bottom:2px solid transparent;text-decoration:none;">Reports</a>
        <a href="kpi.html" style="padding:10px 20px;font-size:13px;font-weight:500;color:var(--gray-500);border-bottom:2px solid transparent;text-decoration:none;">Insights</a>
        <a href="pipeline.html" style="padding:10px 20px;font-size:13px;font-weight:600;color:var(--primary);border-bottom:2px solid var(--primary);text-decoration:none;">Pipeline</a>
    </div>

    <div class="page-content">
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="label">Total Jobs</div><div class="stat-value" id="statTotal">-</div></div>
            <div class="stat-card"><div class="label">Revenue in Pipeline</div><div class="stat-value" id="statRevenue">-</div></div>
            <div class="stat-card"><div class="label">Completed This Month</div><div class="stat-value" id="statCompleted">-</div></div>
        </div>

        <div class="kanban" id="kanban">
            <div class="loading-state" style="width:100%"><div class="loading-spinner"></div>Loading pipeline...</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const stages = [
    { key: 'new', label: 'New' },
    { key: 'quoted', label: 'Quoted' },
    { key: 'scheduled', label: 'Scheduled' },
    { key: 'in_progress', label: 'In Progress' },
    { key: 'completed', label: 'Completed' },
    { key: 'invoiced', label: 'Invoiced' }
];

let pipelineData = {};

async function loadPipeline() {
    try {
        const res = await fetch('/api/jobs/pipeline');
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        pipelineData = data.pipeline;
        renderBoard(data);
    } catch (e) {
        document.getElementById('kanban').innerHTML = '<div class="loading-state">Failed to load pipeline.</div>';
    }
}

function renderBoard(data) {
    const counts = data.counts || {};
    let totalJobs = 0, totalRevenue = 0, completedThisMonth = 0;
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

    stages.forEach(s => totalJobs += (counts[s.key] || 0));

    Object.values(data.pipeline).flat().forEach(j => {
        totalRevenue += parseFloat(j.service_price) || 0;
        if (j.status === 'completed' && j.completed_at && new Date(j.completed_at) >= monthStart) completedThisMonth++;
    });

    document.getElementById('statTotal').textContent = totalJobs.toLocaleString();
    document.getElementById('statRevenue').textContent = '$' + totalRevenue.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    document.getElementById('statCompleted').textContent = completedThisMonth.toLocaleString();

    const kanban = document.getElementById('kanban');
    kanban.innerHTML = stages.map(s => {
        const jobs = data.pipeline[s.key] || [];
        const cards = jobs.map(j => renderCard(j)).join('');
        return `<div class="kanban-col col-${s.key}">
            <div class="col-header">
                <h3><span class="col-dot"></span>${s.label}</h3>
                <span class="col-count">${jobs.length}</span>
            </div>
            <div class="col-body" data-stage="${s.key}"
                ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
                ${cards || '<div style="text-align:center;padding:20px;color:var(--gray-400);font-size:12px;">No jobs</div>'}
            </div>
        </div>`;
    }).join('');
}

function renderCard(j) {
    const date = j.job_date ? new Date(j.job_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
    const price = parseFloat(j.service_price) || 0;
    return `<div class="job-card" draggable="true" data-id="${j.id}"
        ondragstart="handleDragStart(event)" ondragend="handleDragEnd(event)"
        onclick="window.location.href='job-detail.html?id=${j.id}'">
        <div class="jc-customer">${esc(j.customer_name || 'Unknown')}</div>
        <div class="jc-service">${esc(j.service_type || '')}</div>
        <div class="jc-meta">
            <span class="jc-date">${date}</span>
            <span class="jc-price">$${price.toFixed(0)}</span>
        </div>
        ${j.crew_assigned ? `<span class="jc-crew">${esc(j.crew_assigned)}</span>` : ''}
    </div>`;
}

let draggedId = null;

function handleDragStart(e) {
    draggedId = e.target.dataset.id;
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggedId);
}

function handleDragEnd(e) {
    e.target.classList.remove('dragging');
    document.querySelectorAll('.col-body').forEach(el => el.classList.remove('drag-over'));
}

function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
}

function handleDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
}

async function handleDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    const stage = e.currentTarget.dataset.stage;
    const id = e.dataTransfer.getData('text/plain') || draggedId;
    if (!id || !stage) return;

    try {
        const res = await fetch(`/api/jobs/${id}/pipeline`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ stage })
        });
        const data = await res.json();
        if (data.success) {
            showToast('Moved to ' + stages.find(s => s.key === stage)?.label);
            loadPipeline();
        } else {
            showToast(data.error || 'Failed');
        }
    } catch (err) {
        showToast('Failed to move job');
    }
}

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

document.addEventListener('DOMContentLoaded', loadPipeline);

// Universal Search
let searchDebounceTimer=null;
function initUniversalSearch(){const i=document.getElementById('universalSearch'),r=document.getElementById('searchResults'),c=document.getElementById('searchClear');if(!i)return;document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();i.focus()}});i.addEventListener('input',()=>{clearTimeout(searchDebounceTimer);const q=i.value.trim();if(!q){r.style.display='none';c.style.display='none';return}c.style.display='flex';searchDebounceTimer=setTimeout(()=>performSearch(q),300)});c.addEventListener('click',()=>{i.value='';r.style.display='none';c.style.display='none';i.focus()});i.addEventListener('blur',()=>setTimeout(()=>r.style.display='none',200));i.addEventListener('keydown',e=>{if(e.key==='Escape'){r.style.display='none';i.blur()}})}
function searchEscHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
async function performSearch(query){const el=document.getElementById('searchResults');el.innerHTML='<div class="search-loading">Searching...</div>';el.style.display='block';try{const[cRes,qRes,pRes]=await Promise.all([fetch('/api/customers?search='+encodeURIComponent(query)+'&limit=5'),fetch('/api/sent-quotes?search='+encodeURIComponent(query)+'&limit=5'),fetch('/api/properties?search='+encodeURIComponent(query)+'&limit=5')]);const customers=((await cRes.json()).customers||[]).slice(0,4),quotes=((await qRes.json()).quotes||[]).slice(0,4),properties=((await pRes.json()).properties||[]).slice(0,4);let html='';if(customers.length){html+='<div class="search-results-group"><div class="search-group-label">Customers</div>';customers.forEach(c=>{html+='<a href="customer-detail.html?id='+c.id+'" class="search-result-item"><div class="search-result-icon customer">👤</div><div class="search-result-content"><div class="search-result-title">'+searchEscHtml(c.name||'Unknown')+'</div><div class="search-result-subtitle">'+searchEscHtml(c.email||c.phone||'')+'</div></div></a>'});html+='</div>'}if(quotes.length){html+='<div class="search-results-group"><div class="search-group-label">Quotes</div>';quotes.forEach(q=>{html+='<a href="sent-quotes.html?quote='+q.id+'" class="search-result-item"><div class="search-result-icon quote">📄</div><div class="search-result-content"><div class="search-result-title">Quote #'+searchEscHtml(q.quote_number||String(q.id))+'</div><div class="search-result-subtitle">'+searchEscHtml(q.customer_name||'Unknown')+'</div></div><span class="search-result-badge" style="background:#f5f3ff;color:#7c3aed;">'+searchEscHtml(q.status||'')+'</span></a>'});html+='</div>'}if(properties.length){html+='<div class="search-results-group"><div class="search-group-label">Properties</div>';properties.forEach(p=>{html+='<a href="properties.html?id='+p.id+'" class="search-result-item"><div class="search-result-icon property">🏠</div><div class="search-result-content"><div class="search-result-title">'+searchEscHtml(p.property_name||p.street||'Unnamed')+'</div><div class="search-result-subtitle">'+searchEscHtml([p.street,p.city,p.state].filter(Boolean).join(', '))+'</div></div></a>'});html+='</div>'}if(!html)html='<div class="search-empty">No results for "'+searchEscHtml(query)+'"</div>';el.innerHTML=html}catch(e){el.innerHTML='<div class="search-empty">Search failed.</div>'}}
document.addEventListener('DOMContentLoaded',initUniversalSearch);
</script>
</body>
</html>
