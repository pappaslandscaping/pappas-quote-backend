<div style="margin:0 auto;max-width:568px;background-color:#ffffff;">
  <table align="center" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#ffffff;width:100%;border-collapse:collapse;">
    <tbody>
      <tr>
        <td style="padding:18px 28px 0 28px;">
          <div style="background-color:#f7f9f5;border:1px solid #d7dfd1;border-radius:12px;padding:18px 20px;">
            <div
              style="
                font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
                font-size:13px;
                font-weight:700;
                letter-spacing:0.8px;
                line-height:1.6;
                text-transform:uppercase;
                color:#5b6773;
                padding:0 0 12px 0;
              "
            >
              Account Summary
            </div>
            <table
              border="0"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
              width="100%"
              style="
                border-collapse:collapse;
                color:#1f2933;
                font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
                font-size:13px;
                line-height:22px;
                width:100%;
              "
            >
              <tbody>
                <tr>
                  <td style="font-size:13px;font-weight:700;color:#5b6773;padding:12px 0;border-bottom:1px solid #d7dfd1;">Invoice</td>
                  <td align="right" style="font-size:15px;font-weight:700;color:#1f2933;text-align:right;padding:12px 0;border-bottom:1px solid #d7dfd1;">{{INVOICE_NUMBER}}</td>
                </tr>
                <tr>
                  <td style="font-size:13px;font-weight:700;color:#5b6773;padding:12px 0;border-bottom:1px solid #d7dfd1;">Due Date</td>
                  <td align="right" style="font-size:15px;font-weight:700;color:#1f2933;text-align:right;padding:12px 0;border-bottom:1px solid #d7dfd1;">{{INVOICE_DUE_DATE}}</td>
                </tr>
                <tr>
                  <td style="font-size:13px;font-weight:700;color:#5b6773;padding:12px 0;">Account Balance</td>
                  <td align="right" style="font-size:15px;font-weight:700;color:#1f2933;text-align:right;padding:12px 0;">{{CUSTOMER_ACCOUNT_BALANCE}}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
