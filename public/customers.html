<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers — YardDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        /* Stats / cards / status pills now defined in shared.css.
           Only page-specific overrides remain here. */
        .stats-row { margin-bottom: var(--space-5); }

        .icon-blue { background: var(--info-bg); color: var(--info); }
        .icon-amber { background: var(--warning-bg); color: var(--warning); }
        .icon-green { background: var(--success-bg); color: var(--success); }
        .icon-purple { background: var(--surface-soft); color: var(--brand-soft); }

        /* Table styles tightened */
        table { width: 100%; border-collapse: collapse; }
        th {
            padding: 12px 18px;
            text-align: left;
            font: 700 11px/1.4 var(--font-ui);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: var(--surface-soft);
            border-bottom: 1px solid var(--line);
        }
        td {
            padding: 14px 18px;
            font: 500 14px/1.4 var(--font-ui);
            color: var(--text);
            border-bottom: 1px solid var(--line);
        }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s ease; }
        tbody tr:hover td { background: var(--surface-soft); }

        .td-name { font-weight: 700; color: var(--text-strong); }
        .td-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .td-phone a { color: var(--text); text-decoration: none; }
        .td-phone a:hover { color: var(--brand-deep); }

        /* Status pill base from shared.css; page-specific status colors */
        .status-new       { background: var(--info-bg);    color: var(--info);    }
        .status-contacted { background: var(--warning-bg); color: var(--warning); }
        .status-quoted    { background: var(--surface-soft); color: var(--brand-soft); }
        .status-scheduled { background: var(--success-bg); color: var(--success); }
        .status-cancelled { background: var(--danger-bg);  color: var(--danger);  }

        .row-actions {
            display: flex;
            gap: 4px;
        }

        .row-btn {
            min-height: 32px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: var(--surface);
            font: 600 12px/1 var(--font-ui);
            color: var(--text);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .row-btn:hover {
            background: var(--surface-soft);
            border-color: var(--line-strong);
            color: var(--brand-deep);
        }
        .row-btn.delete { color: var(--danger); }
        .row-btn.delete:hover {
            border-color: var(--danger);
            background: var(--danger-bg);
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-400);
            font-size: 14px;
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
        }

        .status-processed { background: var(--warning-bg); color: var(--warning); }
        .status-active    { background: var(--success-bg); color: var(--success); }
        .status-inactive  { background: var(--surface-muted); color: var(--muted); }
        .icon-red         { background: var(--danger-bg); color: var(--danger); }

        .pagination {
            display: flex; align-items: center; justify-content: space-between;
            padding: var(--space-4) var(--space-5);
            border-top: 1px solid var(--line);
            font: 500 13px/1.4 var(--font-ui);
            color: var(--muted);
        }
        .pagination button {
            min-height: 32px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: var(--surface);
            font: 600 13px/1 var(--font-ui);
            color: var(--text);
            cursor: pointer;
            transition: background 0.15s;
        }
        .pagination button:hover { background: var(--surface-soft); }
        .pagination button:disabled { opacity: 0.4; cursor: default; }

        /* Inline tag — use shared .tag base; override here only for table density */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font: 700 11px/1.4 var(--font-ui);
            background: var(--surface-soft);
            color: var(--muted);
            margin: 1px;
        }

        .type-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font: 700 11px/1.4 var(--font-ui);
            background: var(--surface-soft);
            color: var(--brand-soft);
        }
        .type-pill.type-customer { background: var(--success-bg); color: var(--success); }
        .type-pill.type-lead { background: var(--info-bg); color: var(--info); }

        .pipeline-tab {
            min-height: 36px;
            padding: 0 16px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            font: 700 13px/1 var(--font-ui);
            color: var(--muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .pipeline-tab:hover { background: var(--surface-soft); color: var(--text); }
        .pipeline-tab.active { background: var(--brand-deep); color: var(--surface); }

        /* Use the dashboard-card pattern from shared.css for the list */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .table-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4) var(--space-5);
            border-bottom: 1px solid var(--line);
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        .table-toolbar-left {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        .table-toolbar h3 {
            font: 700 16px/1 var(--font-ui);
            color: var(--text-strong);
            margin-right: var(--space-2);
        }

        /* filter-select inherits .control from shared.css; add the chevron */
        .filter-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%237b8681' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 36px;
            cursor: pointer;
        }

        /* search-input picks up shared .control base */
        .search-input {
            min-width: 240px;
        }

        @media (max-width: 1024px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
            .table-toolbar { flex-direction: column; gap: 10px; align-items: stretch; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>
<script src="shell.js"></script>

<div class="main">
    <div class="topbar">
        <div class="topbar-left">
            <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1>Clients</h1>
        </div>
        <div class="topbar-actions">
            <div class="topbar-search-wrap" id="search-container">
                <div class="topbar-search-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </div>
                <input type="text" class="topbar-search-input" id="search-input" placeholder="Search..." autocomplete="off">
                <div class="search-dropdown" id="search-dropdown"></div>
            </div>
            <button class="topbar-icon-btn" title="Notifications">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            </button>
            <div class="topbar-avatar" title="Account">TP</div>
        </div>
    </div>

    <div class="page-content">
        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h2 class="page-title">Clients</h2>
                <p class="page-subtitle">Customer records, leads, and pipeline</p>
            </div>
            <div style="display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap;">
                <a href="properties.html" class="btn btn-secondary">Properties</a>
                <a href="new-customer.html" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Client
                </a>
            </div>
        </div>

        <!-- Pipeline Tabs -->
        <div style="display:flex;gap:4px;margin-bottom:var(--space-5);background:var(--surface);border-radius:var(--radius-md);padding:4px;border:1px solid var(--line);width:fit-content">
            <button class="pipeline-tab active" onclick="setPipelineTab('')" id="tabAll">All</button>
            <button class="pipeline-tab" onclick="setPipelineTab('customer')" id="tabCustomers">Customers <span id="tabCustomerCount" style="font-size:11px;opacity:0.7"></span></button>
            <button class="pipeline-tab" onclick="setPipelineTab('lead')" id="tabLeads">Leads <span id="tabLeadCount" style="font-size:11px;opacity:0.7"></span></button>
        </div>

        <div class="stats-row" style="grid-template-columns: repeat(5, 1fr);">
            <div class="stat-card">
                <div class="stat-header"><span class="stat-label">Total</span><div class="stat-icon icon-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div></div>
                <div class="stat-value" id="statTotal">--</div>
                <div class="stat-footer" id="trendFooter" style="display:none">
                    <span class="trend" id="trendBadge"></span>
                    <span class="trend-label">vs last 30 days</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><span class="stat-label">Customers</span><div class="stat-icon icon-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div></div>
                <div class="stat-value" id="statActive">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><span class="stat-label">Leads</span><div class="stat-icon" style="background:var(--purple-bg);color:var(--purple)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></div></div>
                <div class="stat-value" id="statLeads">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><span class="stat-label">Conversion Rate</span><div class="stat-icon icon-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div></div>
                <div class="stat-value" id="statConversion">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><span class="stat-label">New This Month</span><div class="stat-icon icon-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div></div>
                <div class="stat-value" id="statNewMonth">--</div>
            </div>
        </div>
        <div class="table-card">
            <div class="table-toolbar">
                <div class="table-toolbar-left">
                    <h3>All Customers</h3>
                    <select class="filter-select" id="statusFilter" onchange="currentOffset=0;loadCustomers()">
                        <option value="">All Statuses</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                    <select class="filter-select" id="typeFilter" onchange="currentOffset=0;currentPipelineTab=this.value;document.querySelectorAll('.pipeline-tab').forEach(t=>t.classList.remove('active'));document.getElementById(this.value==='lead'?'tabLeads':this.value==='customer'?'tabCustomers':'tabAll').classList.add('active');loadCustomers()">
                        <option value="">All Types</option>
                        <option value="customer">Customers</option>
                        <option value="lead">Leads</option>
                    </select>
                    <select class="filter-select" id="cityFilter" onchange="currentOffset=0;loadCustomers()">
                        <option value="">All Cities</option>
                    </select>
                    <select class="filter-select" id="sortSelect" onchange="currentOffset=0;loadCustomers()">
                        <option value="name_asc">Name (A-Z)</option>
                        <option value="name_desc">Name (Z-A)</option>
                        <option value="type_asc">Type (A-Z)</option>
                        <option value="type_desc">Type (Z-A)</option>
                        <option value="city_asc">City (A-Z)</option>
                        <option value="city_desc">City (Z-A)</option>
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="customer_number_asc">Customer # (Low-High)</option>
                        <option value="customer_number_desc">Customer # (High-Low)</option>
                    </select>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search name, email, address..." oninput="debounceSearch()">
                </div>
            </div>
            <div id="loadingState" class="loading-state"><div class="loading-spinner"></div>Loading customers...</div>
            <table id="dataTable" style="display:none;">
                <thead><tr><th>#</th><th>Name</th><th>Score</th><th>Email</th><th>Phone</th><th>City</th><th>Type</th><th>Tags</th><th>Status</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="pagination" id="pagination" style="display:none"><span id="pageInfo"></span><div style="display:flex;gap:8px"><button id="prevBtn" onclick="prevPage()">Previous</button><button id="nextBtn" onclick="nextPage()">Next</button></div></div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
let allCustomers=[];
let allTypes=[];
let leadScoreMap={};
let currentOffset=0;
const PAGE_SIZE=50;
let searchTimeout;

let currentPipelineTab = '';

function setPipelineTab(type) {
    currentPipelineTab = type;
    document.querySelectorAll('.pipeline-tab').forEach(t => t.classList.remove('active'));
    if (type === 'lead') document.getElementById('tabLeads').classList.add('active');
    else if (type === 'customer') document.getElementById('tabCustomers').classList.add('active');
    else document.getElementById('tabAll').classList.add('active');
    // Update the type filter to match
    document.getElementById('typeFilter').value = type;
    currentOffset = 0;
    loadCustomers();
}

async function convertToCustomer(id, event) {
    if (event) event.stopPropagation();
    try {
        const r = await fetch('/api/customers/' + id, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customer_type: 'customer' })
        });
        const d = await r.json();
        if (d.success) {
            showToast('Converted to customer');
            loadStats();
            loadCustomers();
        }
    } catch(e) { showToast('Error converting'); }
}

async function loadStats(){
    try {
        const [r, pr] = await Promise.all([
            fetch('/api/customers/stats'),
            fetch('/api/customers/pipeline-stats')
        ]);
        const d=await r.json();
        const pd=await pr.json();
        const s=d.stats;
        const ps=pd.stats || {};
        document.getElementById('statTotal').textContent=s.total;
        document.getElementById('statActive').textContent=ps.totalCustomers || s.active;
        document.getElementById('statLeads').textContent=ps.totalLeads || 0;
        document.getElementById('statConversion').textContent=(ps.conversionRate || 0) + '%';
        document.getElementById('statNewMonth').textContent=ps.newLeadsThisMonth || 0;
        document.getElementById('tabCustomerCount').textContent='(' + (ps.totalCustomers || 0) + ')';
        document.getElementById('tabLeadCount').textContent='(' + (ps.totalLeads || 0) + ')';

        // Trend indicator
        if(s.trend){
            const foot=document.getElementById('trendFooter');
            const badge=document.getElementById('trendBadge');
            const pct=s.trend.pct;
            const arrow=pct>0?'↑':pct<0?'↓':'→';
            const cls=pct>0?'up':pct<0?'down':'flat';
            badge.className='trend '+cls;
            badge.textContent=arrow+' '+Math.abs(pct)+'%';
            foot.style.display='';
        }

        // Populate city filter
        const cs=document.getElementById('cityFilter');
        const cv=cs.value;
        cs.innerHTML='<option value="">All Cities</option>';
        if(s.topCities) s.topCities.forEach(c=>{
            if(c.city){
                const o=document.createElement('option');
                o.value=c.city;
                o.textContent=c.city+' ('+c.count+')';
                cs.appendChild(o);
            }
        });
        cs.value=cv;

        // Pipeline tab sync
        if (currentPipelineTab) {
            document.getElementById('typeFilter').value = currentPipelineTab;
        }
    } catch(e) {
        console.error(e);
    }
}

async function loadTypes(){
    try {
        const r=await fetch('/api/customers?limit=5000');
        const d=await r.json();
        const customers=d.customers||[];

        // Get unique types
        const typeMap={};
        customers.forEach(c=>{
            if(c.type && c.type.trim()){
                const t=c.type.trim();
                typeMap[t]=(typeMap[t]||0)+1;
            }
        });

        // Sort by count
        allTypes=Object.entries(typeMap).sort((a,b)=>b[1]-a[1]);

        // Populate type filter
        const ts=document.getElementById('typeFilter');
        const tv=ts.value;
        ts.innerHTML='<option value="">All Types</option>';
        allTypes.forEach(([type,count])=>{
            const o=document.createElement('option');
            o.value=type;
            o.textContent=type+' ('+count+')';
            ts.appendChild(o);
        });
        ts.value=tv;
    } catch(e) {
        console.error(e);
    }
}

async function loadCustomers(){
    document.getElementById('loadingState').style.display='block';
    document.getElementById('dataTable').style.display='none';
    try {
        const search=document.getElementById('searchInput').value;
        const status=document.getElementById('statusFilter').value;
        const type=currentPipelineTab || document.getElementById('typeFilter').value;
        const city=document.getElementById('cityFilter').value;
        const sort=document.getElementById('sortSelect').value;

        const p=new URLSearchParams({limit:PAGE_SIZE,offset:currentOffset});
        if(search) p.set('search',search);
        if(status) p.set('status',status);
        if(type) p.set('type',type);
        if(city) p.set('city',city);
        if(sort) p.set('sort',sort);

        const r=await fetch('/api/customers?'+p);
        const d=await r.json();
        allCustomers=d.customers||[];
        renderTable();

        const total=d.total||0;
        const pag=document.getElementById('pagination');
        if(total>PAGE_SIZE){
            pag.style.display='flex';
            document.getElementById('pageInfo').textContent='Showing '+(currentOffset+1)+'–'+Math.min(currentOffset+PAGE_SIZE,total)+' of '+total;
            document.getElementById('prevBtn').disabled=currentOffset===0;
            document.getElementById('nextBtn').disabled=currentOffset+PAGE_SIZE>=total;
        } else {
            pag.style.display='none';
        }
    } catch(e) {
        console.error(e);
        document.getElementById('loadingState').innerHTML='<p>Failed to load</p>';
    }
}

function getLeadBadge(id){
    const s=leadScoreMap[id];
    if(!s) return '<span style="font-size:11px;color:var(--gray-400)">—</span>';
    const colors={Hot:'background:var(--red-bg);color:var(--red)',Warm:'background:var(--amber-bg);color:var(--amber)',Cold:'background:var(--blue-bg);color:var(--blue)'};
    return '<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;'+colors[s.grade]+'">'+s.grade+'</span>';
}

function renderTable(){
    document.getElementById('loadingState').style.display='none';
    document.getElementById('dataTable').style.display='table';
    const tb=document.getElementById('tableBody');

    if(!allCustomers.length){
        tb.innerHTML='<tr><td colspan="9"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>No customers found</p></div></td></tr>';
        return;
    }

    tb.innerHTML=allCustomers.map(c=>{
        const name=c.name||((c.first_name||'')+' '+(c.last_name||'')).trim()||'—';
        const tags=c.tags?c.tags.split(',').map(t=>'<span class="tag">'+esc(t.trim())+'</span>').join(' '):'—';
        const isA=(c.status||'').toLowerCase()==='active';
        const cType = c.customer_type || 'customer';
        const typePill = '<span class="type-pill type-'+cType+'">'+(cType === 'lead' ? 'Lead' : 'Customer')+'</span>';

        return '<tr style="cursor:pointer" onclick="window.location.href=\'customer-detail.html?id='+c.id+'\'">'+
            '<td style="color:var(--gray-400);font-size:12px">'+esc(c.customer_number||'—')+'</td>'+
            '<td><div class="td-name">'+esc(name)+'</div></td>'+
            '<td>'+getLeadBadge(c.id)+'</td>'+
            '<td>'+esc(c.email||'—')+'</td>'+
            '<td>'+esc(c.phone||c.mobile||'—')+'</td>'+
            '<td>'+esc(c.city||'—')+'</td>'+
            '<td>'+typePill+'</td>'+
            '<td>'+tags+'</td>'+
            '<td><span class="status-pill status-'+(isA?'active':'inactive')+'">'+esc(c.status||'—')+'</span></td>'+
            '</tr>';
    }).join('');
}

function prevPage(){if(currentOffset>0){currentOffset-=PAGE_SIZE;loadCustomers();}}
function nextPage(){currentOffset+=PAGE_SIZE;loadCustomers();}
function debounceSearch(){clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>{currentOffset=0;loadCustomers();},300);}

function exportCSV(){
    if(!allCustomers.length) return showToast('No data');
    const h=['Number','Name','Email','Phone','City','State','Address','Type','Tags','Status'];
    const r=allCustomers.map(c=>[c.customer_number||'',c.name||'',c.email||'',c.phone||'',c.city||'',c.state||'',c.street||'',c.type||'',c.tags||'',c.status||'']);
    let csv=h.join(',')+String.fromCharCode(10);
    r.forEach(row=>{csv+=row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')+String.fromCharCode(10);});
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='pappas-customers-'+new Date().toISOString().split('T')[0]+'.csv';
    a.click();
    showToast('CSV exported');
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
async function loadLeadScores(){
    try {
        const r=await fetch('/api/ai/lead-scores');
        const d=await r.json();
        if(d.success && d.customers){
            d.customers.forEach(c=>{leadScoreMap[c.id]={grade:c.grade,score:c.score};});
            renderTable();
        }
    } catch(e){ console.error('Lead scores:',e); }
}
document.addEventListener('DOMContentLoaded',()=>{loadStats();loadCustomers();loadLeadScores();});

</script>

<script>
(function(){
  var btn = document.getElementById('quick-create-btn');
  var menu = document.getElementById('quick-create-menu');
  var overlay = document.getElementById('qc-overlay');
  if (!btn || !menu || !overlay) return;
  btn.addEventListener('click', function() {
    menu.classList.toggle('visible');
    overlay.classList.toggle('visible');
  });
  document.addEventListener('click', function(e) {
    if (!btn.contains(e.target) && !menu.contains(e.target)) {
      menu.classList.remove('visible');
      overlay.classList.remove('visible');
    }
  });
  overlay.addEventListener('click', function() {
    menu.classList.remove('visible');
    overlay.classList.remove('visible');
  });
})();
</script>
